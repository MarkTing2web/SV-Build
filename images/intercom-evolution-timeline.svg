<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Main Timeline Arrow -->
  <line x1="50" y1="180" x2="590" y2="180" stroke="#CBD5E0" stroke-width="4" marker-end="url(#tArrow)"/>
  
  <!-- Node 1: 1990s - 2000s -->
  <g id="node1">
    <circle cx="100" cy="180" r="10" fill="#718096"/>
    <text x="100" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">1990s - 2000s</text>
    <rect x="50" y="80" width="100" height="60" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Analogue</text>
    <text x="100" y="118" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">CRT Screen, Audio Only</text>
    <text x="100" y="128" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Proprietary Wiring</text>
  </g>
  
  <!-- Node 2: 2010s -->
  <g id="node2">
    <circle cx="320" cy="180" r="10" fill="#3182CE"/>
    <text x="320" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">2010s</text>
    <rect x="270" y="230" width="100" height="60" rx="4" fill="#EBF8FF" stroke="#3182CE"/>
    <text x="320" y="255" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2B6CB0" text-anchor="middle">IP Network</text>
    <text x="320" y="268" font-family="Arial, sans-serif" font-size="8" fill="#2B6CB0" text-anchor="middle">HD Video, CAT6 PoE</text>
    <text x="320" y="278" font-family="Arial, sans-serif" font-size="8" fill="#2B6CB0" text-anchor="middle">On-Prem Server</text>
  </g>
  
  <!-- Node 3: 2020s - Present -->
  <g id="node3">
    <circle cx="540" cy="180" r="12" fill="#2B6CB0"/>
    <text x="540" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D" text-anchor="middle">2020s - Present</text>
    <rect x="490" y="80" width="100" height="60" rx="4" fill="#2B6CB0"/>
    <text x="540" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Cloud & Smart</text>
    <text x="540" y="118" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle">Mobile-First, QR Code</text>
    <text x="540" y="128" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle">Global Access</text>
  </g>
  
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">The Evolution of Intercom Technology</text>
  
  <defs>
    <marker id="tArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E0"/>
    </marker>
  </defs>
</svg>
