<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Floor Plan Layout -->
  <g id="floor-plan">
    <rect x="180" y="80" width="280" height="220" stroke="#CBD5E0" stroke-width="2" fill="#F7FAFC"/>
    <rect x="180" y="80" width="140" height="100" stroke="#E2E8F0"/> <text x="250" y="130" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">KITCHEN</text>
    <rect x="320" y="80" width="140" height="100" stroke="#E2E8F0"/> <text x="390" y="130" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">LIVING ROOM</text>
    <rect x="180" y="180" width="280" height="120" stroke="#E2E8F0"/> <text x="320" y="240" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">LANDING / HALLWAY</text>
  </g>
  
  <!-- Master Bedroom (Separate Area) -->
  <rect x="40" y="80" width="120" height="100" stroke="#CBD5E0" stroke-width="2" fill="#F7FAFC"/>
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">MASTER BDRM</text>
  
  <!-- Annotation Ribbons / Callouts -->
  <!-- 1. Kitchen (Primary) -->
  <circle cx="210" cy="100" r="10" fill="#3182CE"/>
  <text x="210" y="104" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <path d="M210 90 L210 60 L240 60" stroke="#3182CE" stroke-width="1"/>
  <rect x="240" y="50" width="160" height="20" rx="10" fill="#BEE3F8"/>
  <text x="320" y="64" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Primary — High Foot Traffic</text>
  
  <!-- 2. Living Room (Secondary) -->
  <circle cx="430" cy="100" r="10" fill="#3182CE"/>
  <text x="430" y="104" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <path d="M430 90 L430 40 L460 40" stroke="#3182CE" stroke-width="1"/>
  <rect x="460" y="30" width="160" height="20" rx="10" fill="#BEE3F8"/>
  <text x="540" y="44" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Secondary — Social Area</text>
  
  <!-- 3. Master Bedroom (Privacy) -->
  <circle cx="70" cy="100" r="10" fill="#3182CE"/>
  <text x="70" y="104" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <path d="M70 90 L70 40 L40 40" stroke="#3182CE" stroke-width="1" transform="scale(-1 1) translate(-80 0)"/>
  <rect x="10" y="30" width="160" height="20" rx="10" fill="#BEE3F8"/>
  <text x="90" y="44" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Privacy — Bedroom Use</text>
  
  <!-- 4. Landing (Supplementary) -->
  <circle cx="320" cy="220" r="10" fill="#3182CE"/>
  <text x="320" y="224" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <path d="M320 230 L320 320 L350 320" stroke="#3182CE" stroke-width="1"/>
  <rect x="350" y="310" width="160" height="20" rx="10" fill="#BEE3F8"/>
  <text x="430" y="324" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Supplementary Coverage</text>
  
  <text x="320" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">Multi-Monitor Coordination Strategy</text>
</svg>
