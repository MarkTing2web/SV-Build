<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Vertical Divider -->
  <line x1="320" y1="40" x2="320" y2="320" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Left Side: Audio Door Station -->
  <g id="audio-station">
    <text x="160" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748" text-anchor="middle">AUDIO-ONLY STATION</text>
    
    <!-- Audio Unit (Compact) -->
    <rect x="110" y="100" width="100" height="160" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="2"/>
    <!-- Speaker Grille -->
    <rect x="125" y="120" width="70" height="40" rx="2" fill="#EDF2F7"/>
    <g stroke="#A0AEC0" stroke-width="1">
      <line x1="135" y1="130" x2="185" y2="130"/> <line x1="135" y1="135" x2="185" y2="135"/>
      <line x1="135" y1="140" x2="185" y2="140"/> <line x1="135" y1="145" x2="185" y2="145"/>
      <line x1="135" y1="150" x2="185" y2="150"/>
    </g>
    <!-- Call Button -->
    <circle cx="160" cy="210" r="20" fill="white" stroke="#CBD5E0"/>
    <path d="M155 200 L165 200 L165 220 L155 220 Z" fill="#4A5568"/>
    
    <text x="160" y="290" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Compact & Minimal</text>
    <text x="160" y="305" font-family="Arial, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">(Voice + Release Only)</text>
  </g>
  
  <!-- Right Side: Video Door Station -->
  <g id="video-station">
    <text x="480" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">VIDEO DOOR STATION</text>
    
    <!-- Video Unit (Pro) -->
    <rect x="420" y="80" width="120" height="220" rx="4" fill="#2D3748" stroke="#1A202C" stroke-width="2"/>
    <!-- Camera Lens Cover -->
    <rect x="435" y="95" width="90" height="70" rx="4" fill="#1A202C"/>
    <circle cx="480" cy="130" r="20" fill="#2D3748" stroke="#4A5568"/>
    <circle cx="480" cy="130" r="6" fill="#1A365D"/>
    <!-- IR LEDs -->
    <circle cx="450" cy="110" r="2" fill="#E53E3E" fill-opacity="0.4"/>
    <circle cx="510" cy="110" r="2" fill="#E53E3E" fill-opacity="0.4"/>
    
    <!-- LCD / Panel -->
    <rect x="435" y="180" width="90" height="40" rx="2" fill="#3182CE" fill-opacity="0.1" stroke="#3182CE"/>
    <text x="480" y="205" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle" font-weight="bold">TOUCH TO CALL</text>
    
    <!-- Call Button -->
    <circle cx="480" cy="255" r="25" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="2"/>
    <circle cx="480" cy="255" r="10" fill="#2B6CB0"/>
    
    <text x="480" y="325" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Advanced Visual Security</text>
    <text x="480" y="340" font-family="Arial, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">(Wide-Angle HD + Night Vision)</text>
  </g>
  
  <!-- VS Label -->
  <circle cx="320" cy="180" r="25" fill="white" stroke="#E2E8F0"/>
  <text x="320" y="186" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748" text-anchor="middle">VS</text>
</svg>
