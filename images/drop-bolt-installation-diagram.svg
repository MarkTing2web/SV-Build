<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Double Doors Architecture -->
  <rect x="50" y="50" width="300" height="300" rx="4" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="2"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#CBD5E0" stroke-width="2"/> <!-- Center line -->
  
  <!-- Active Leaf (Left) -->
  <rect x="55" y="55" width="140" height="290" fill="white" fill-opacity="0.5"/>
  <circle cx="180" cy="200" r="8" fill="#A0AEC0"/> <!-- Handle -->
  <text x="125" y="320" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Active Leaf</text>
  
  <!-- Inactive Leaf (Right) -->
  <rect x="205" y="55" width="140" height="290" fill="white" fill-opacity="0.5"/>
  <text x="275" y="320" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Inactive Leaf</text>
  
  <!-- Drop Bolt Device (Top/Bottom-mounted) -->
  <rect x="230" y="270" width="80" height="30" rx="4" fill="#1A365D"/>
  <text x="270" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Drop Bolt</text>
  
  <!-- The Bolt (Dropped Position) -->
  <rect x="260" y="300" width="20" height="60" rx="2" fill="#718096"/>
  <path d="M270 300 L270 360" stroke="#3182CE" stroke-width="2" stroke-dasharray="4 2"/>
  <rect x="250" y="355" width="40" height="10" rx="2" fill="#2D3748"/> <!-- Floor Socket -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748">Floor Socket</text>
  
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Drop Bolt (Manual/Electric) Installation</text>
</svg>
