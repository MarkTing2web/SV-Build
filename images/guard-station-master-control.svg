<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Desk/Workstation -->
  <rect x="40" y="240" width="560" height="20" fill="#E2E8F0" stroke="#CBD5E0"/>
  <rect x="80" y="260" width="20" height="80" fill="#CBD5E0"/>
  <rect x="540" y="260" width="20" height="80" fill="#CBD5E0"/>
  
  <!-- Left Monitor (CCTV/Intercom Feeds) -->
  <rect x="80" y="60" width="220" height="150" rx="4" fill="#2D3748" stroke="#1A202C" stroke-width="4"/>
  <rect x="90" y="70" width="200" height="130" fill="black"/>
  <!-- Grid of Feeds -->
  <g stroke="#4A5568" stroke-width="0.5">
    <line x1="90" y1="102" x2="290" y2="102"/> <line x1="90" y1="135" x2="290" y2="135"/> <line x1="90" y1="168" x2="290" y2="168"/>
    <line x1="140" y1="70" x2="140" y2="200"/> <line x1="190" y1="70" x2="190" y2="200"/> <line x1="240" y1="70" x2="240" y2="200"/>
  </g>
  <text x="190" y="195" font-family="Arial, sans-serif" font-size="8" fill="#48BB78" text-anchor="middle" font-weight="bold">LIVE: LOBBY A, B, C / SIDE GATE</text>
  
  <!-- Right Monitor (Management Interface) -->
  <rect x="340" y="60" width="220" height="150" rx="4" fill="#2D3748" stroke="#1A202C" stroke-width="4"/>
  <rect x="350" y="70" width="200" height="130" fill="white"/>
  <rect x="350" y="70" width="200" height="20" fill="#2B6CB0"/>
  <text x="360" y="84" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">VISITOR MANAGEMENT LOG</text>
  <!-- Log Lines -->
  <line x1="360" y1="105" x2="540" y2="105" stroke="#E2E8F0"/>
  <line x1="360" y1="125" x2="540" y2="125" stroke="#E2E8F0"/>
  <line x1="360" y1="145" x2="540" y2="145" stroke="#E2E8F0"/>
  <circle cx="365" cy="115" r="5" fill="#48BB78"/> <text x="375" y="118" font-family="Arial, sans-serif" font-size="7" fill="#2D3748">Unit 12-08: Main Gate [Access Granted]</text>
  <circle cx="365" cy="135" r="5" fill="#F56565"/> <text x="375" y="138" font-family="Arial, sans-serif" font-size="7" fill="#2D3748">Unit 04-12: Lobby B [Access Denied]</text>
  
  <!-- Hardware -->
  <!-- Keyboard -->
  <rect x="180" y="220" width="120" height="15" rx="2" fill="#A0AEC0"/>
  <!-- Intercom Handset -->
  <rect x="420" y="210" width="40" height="30" rx="4" fill="#1A365D"/>
  <rect x="430" y="215" width="20" height="40" rx="4" fill="#2D3748" transform="rotate(-15 430 215)"/> <!-- Phone -->
  
  <!-- Labels -->
  <text x="190" y="235" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">Multi-Feed Video Wall</text>
  <text x="450" y="235" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">Management Terminal</text>

  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Guard House Master Intercom Control Station</text>
  
  <!-- Background Context (Guardhouse Window) -->
  <rect x="0" y="40" width="30" height="200" fill="#EDF2F7"/>
  <line x1="15" y1="40" x2="15" y2="240" stroke="#CBD5E0" stroke-width="1"/>
  <text x="15" y="30" font-family="Arial, sans-serif" font-size="8" fill="#A0AEC0" text-anchor="middle">Window to Entrance</text>
</svg>
