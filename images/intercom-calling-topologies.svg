<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Panel 1: Unrestricted / Full Mesh -->
  <g id="full-mesh">
    <rect x="20" y="50" width="190" height="260" rx="8" fill="#EDF2F7" stroke="#CBD5E0"/>
    <text x="115" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">1. Unrestricted (Full Mesh)</text>
    <text x="115" y="95" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">All-to-All Peer Communication</text>
    
    <!-- Nodes -->
    <circle cx="115" cy="140" r="10" fill="#2B6CB0"/>
    <circle cx="80" cy="180" r="10" fill="#2B6CB0"/>
    <circle cx="150" cy="180" r="10" fill="#2B6CB0"/>
    <circle cx="95" cy="240" r="10" fill="#2B6CB0"/>
    <circle cx="135" cy="240" r="10" fill="#2B6CB0"/>
    
    <!-- Lines (Mesh) -->
    <path d="M115 140 L80 180 M115 140 L150 180 M115 140 L95 240 M115 140 L135 240" stroke="#3182CE" stroke-width="1.5"/>
    <path d="M80 180 L150 180 M80 180 L95 240 M80 180 L135 240" stroke="#3182CE" stroke-width="1.5"/>
    <path d="M150 180 L95 240 M150 180 L135 240" stroke="#3182CE" stroke-width="1.5"/>
    <path d="M95 240 L135 240" stroke="#3182CE" stroke-width="1.5"/>
    
    <text x="115" y="290" font-family="Arial, sans-serif" font-size="9" fill="#2D3748" text-anchor="middle">Small Offices / Homes</text>
  </g>
  
  <!-- Panel 2: Master-Substation / Star -->
  <g id="master-sub">
    <rect x="225" y="50" width="190" height="260" rx="8" fill="#F0FFF4" stroke="#38A169"/>
    <text x="320" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">2. Master-Sub (Star)</text>
    <text x="320" y="95" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Central Control Architecture</text>
    
    <!-- Master Node -->
    <circle cx="320" cy="180" r="15" fill="#2D3748"/>
    <text x="320" y="184" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">M</text>
    
    <!-- Substations -->
    <circle cx="320" cy="120" r="8" fill="#CBD5E0"/>
    <circle cx="370" cy="160" r="8" fill="#CBD5E0"/>
    <circle cx="350" cy="220" r="8" fill="#CBD5E0"/>
    <circle cx="290" cy="220" r="8" fill="#CBD5E0"/>
    <circle cx="270" cy="160" r="8" fill="#CBD5E0"/>
    
    <!-- Lines (Star) -->
    <path d="M320 180 L320 120 M320 180 L370 160 M320 180 L350 220 M320 180 L290 220 M320 180 L270 160" stroke="#38A169" stroke-width="2"/>
    
    <text x="320" y="290" font-family="Arial, sans-serif" font-size="9" fill="#2D3748" text-anchor="middle">Hospitals / Gated Facilities</text>
  </g>
  
  <!-- Panel 3: Group-Based -->
  <g id="group-based">
    <rect x="430" y="50" width="190" height="260" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
    <text x="525" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">3. Group-Based (Clustered)</text>
    <text x="525" y="95" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Siloed Communication Groups</text>
    
    <!-- Cluster 1 -->
    <path d="M460 140 Q450 180 490 200 Q510 180 500 140 Z" fill="#3182CE" fill-opacity="0.2"/>
    <circle cx="480" cy="155" r="8" fill="#2B6CB0"/>
    <circle cx="480" cy="180" r="8" fill="#2B6CB0"/>
    <circle cx="500" cy="170" r="8" fill="#2B6CB0"/>
    
    <!-- Cluster 2 -->
    <path d="M550 200 Q540 240 580 260 Q600 240 590 200 Z" fill="#3182CE" fill-opacity="0.2"/>
    <circle cx="570" cy="215" r="8" fill="#2B6CB0"/>
    <circle cx="570" cy="240" r="8" fill="#2B6CB0"/>
    <circle cx="590" cy="230" r="8" fill="#2B6CB0"/>
    
    <!-- Bridge Connection -->
    <path d="M500 170 C535 170 535 215 570 215" stroke="#3182CE" stroke-width="2" stroke-dasharray="4 2"/>
    
    <text x="525" y="290" font-family="Arial, sans-serif" font-size="9" fill="#2D3748" text-anchor="middle">Large Corp / Multi-Silo Orgs</text>
  </g>
  
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Standard Intercom Calling Topologies</text>
</svg>
