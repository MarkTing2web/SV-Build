<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Stage 1: Data Packets -->
  <rect x="20" y="160" width="100" height="80" rx="8" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="70" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Data Packets</text>
  
  <!-- Packet Icons -->
  <rect x="35" y="180" width="20" height="20" rx="2" fill="#3182CE"/>
  <text x="45" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">1</text>
  
  <rect x="60" y="180" width="20" height="20" rx="2" fill="#3182CE"/>
  <text x="70" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">2</text>
  
  <rect x="85" y="180" width="20" height="20" rx="2" fill="#3182CE"/>
  <text x="95" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">3</text>
  
  <!-- Stage 2: Network Switch -->
  <rect x="150" y="160" width="100" height="80" rx="8" fill="#1A365D"/>
  <text x="200" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Network Switch</text>
  
  <!-- Switch Hub with Ports -->
  <rect x="165" y="185" width="70" height="30" rx="2" fill="#2D3748"/>
  <circle cx="175" cy="200" r="3" fill="#48BB78"/> <!-- Green Port -->
  <circle cx="190" cy="200" r="3" fill="#48BB78"/>
  <circle cx="205" cy="200" r="3" fill="#48BB78"/>
  <circle cx="220" cy="200" r="3" fill="#48BB78"/>
  
  <!-- Stage 3: Reassembled Signal -->
  <rect x="280" y="160" width="100" height="80" rx="8" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1"/>
  <text x="330" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Reassembled Signal</text>
  
  <!-- Video Frame Icon -->
  <rect x="295" y="180" width="70" height="40" rx="2" fill="#A0AEC0"/>
  <path d="M315 190 L345 200 L315 210 Z" fill="white"/> <!-- Play triangle -->
  
  <!-- Arrows -->
  <!-- Arrow 1 to 2 -->
  <path d="M125 200 L145 200" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrow 2 to 3 -->
  <path d="M255 200 L275 200" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE" />
    </marker>
  </defs>
  
  <!-- Footer Label -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" text-anchor="middle" font-weight="bold">Digital IP Packet Protocol (SIP)</text>
</svg>
