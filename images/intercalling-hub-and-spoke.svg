<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Master Station (Centre) -->
  <rect x="250" y="140" width="140" height="80" rx="8" fill="#1A365D"/>
  <text x="320" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">MASTER STATION</text>
  <text x="320" y="195" font-family="Arial, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">(Full Control)</text>
  
  <!-- Substations (Periphery) -->
  <!-- Top -->
  <rect x="280" y="40" width="80" height="50" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="320" y="70" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 1</text>
  
  <!-- Top Right -->
  <rect x="450" y="80" width="80" height="50" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="490" y="110" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 2</text>
  
  <!-- Bottom Right -->
  <rect x="450" y="230" width="80" height="50" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="490" y="260" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 3</text>
  
  <!-- Bottom Left -->
  <rect x="110" y="230" width="80" height="50" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 4</text>
  
  <!-- Top Left -->
  <rect x="110" y="80" width="80" height="50" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 5</text>
  
  <!-- Door Station (Far Periphery) -->
  <rect x="20" y="40" width="60" height="90" rx="4" fill="#2D3748"/>
  <circle cx="50" cy="65" r="10" fill="#4A5568"/> <!-- Lens -->
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Door Station</text>
  
  <!-- Connection Lines (Arrows) -->
  <path d="M320 140 L320 95" stroke="#3182CE" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  <path d="M360 140 L445 105" stroke="#3182CE" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  <path d="M360 220 L445 255" stroke="#3182CE" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  <path d="M280 220 L195 255" stroke="#3182CE" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  <path d="M280 140 L195 105" stroke="#3182CE" stroke-width="2" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  
  <!-- Connection to Door Station -->
  <path d="M110 105 L85 105" stroke="#718096" stroke-width="1" stroke-dasharray="4 2"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#3182CE"/>
    </marker>
  </defs>
  
  <text x="320" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Hierarchical Multi-Station Architecture</text>
</svg>
