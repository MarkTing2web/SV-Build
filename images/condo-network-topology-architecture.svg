<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Level 1: Edge -->
  <rect x="270" y="40" width="100" height="40" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="320" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Internet / WAN</text>
  
  <rect x="270" y="100" width="100" height="30" rx="4" fill="#E53E3E" fill-opacity="0.1" stroke="#E53E3E"/>
  <text x="320" y="120" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#C53030" text-anchor="middle">Router / Firewall</text>
  
  <!-- Level 2: Core -->
  <rect x="260" y="150" width="120" height="40" rx="4" fill="#1A365D"/>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">CORE SWITCH</text>
  
  <!-- Level 3: Distribution -->
  <rect x="140" y="220" width="120" height="30" rx="4" fill="#2D3748"/>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">DIST SWITCH (West)</text>
  
  <rect x="380" y="220" width="120" height="30" rx="4" fill="#2D3748"/>
  <text x="440" y="240" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">DIST SWITCH (East)</text>
  
  <!-- Level 4: Edge PoE -->
  <rect x="60" y="280" width="80" height="25" rx="4" fill="#4A5568"/>
  <text x="100" y="297" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">PoE Unit SW</text>
  
  <rect x="220" y="280" width="80" height="25" rx="4" fill="#4A5568"/>
  <text x="260" y="297" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">PoE Lobby SW</text>
  
  <rect x="440" y="280" width="80" height="25" rx="4" fill="#4A5568"/>
  <text x="480" y="297" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">PoE Unit SW</text>
  
  <!-- VLAN labels -->
  <text x="120" y="170" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3182CE">VLAN 20: INTERCOM</text>
  <text x="120" y="180" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#718096">VLAN 10: MGMT DATA</text>
  
  <!-- Connections -->
  <path d="M320 80 L320 100" stroke="#CBD5E0" stroke-width="1.5"/>
  <path d="M320 130 L320 150" stroke="#CBD5E0" stroke-width="1.5"/>
  
  <path d="M260 170 L200 170 L200 220" stroke="#1A365D" stroke-width="1.5"/>
  <path d="M380 170 L440 170 L440 220" stroke="#1A365D" stroke-width="1.5"/>
  
  <path d="M140 235 L100 235 L100 280" stroke="#4A5568" stroke-width="1.2"/>
  <path d="M260 235 L260 280" stroke="#4A5568" stroke-width="1.2"/>
  <path d="M440 250 L480 250 L480 280" stroke="#4A5568" stroke-width="1.2"/>
  
  <!-- Endpoints (Icons) -->
  <circle cx="80" cy="330" r="5" fill="#3182CE"/> <text x="90" y="334" font-family="Arial, sans-serif" font-size="7" fill="#718096">Apartments</text>
  <circle cx="260" cy="330" r="5" fill="#1A365D"/> <text x="270" y="334" font-family="Arial, sans-serif" font-size="7" fill="#718096">Entrance Panel</text>
  <circle cx="480" cy="330" r="5" fill="#3182CE"/> <text x="490" y="334" font-family="Arial, sans-serif" font-size="7" fill="#718096">Penthouse Units</text>
  
  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Condominium Intercom: Enterprise Network Topology</text>
</svg>
