<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Ground Floor (Left) -->
  <g id="ground-floor">
    <rect x="40" y="60" width="260" height="240" stroke="#CBD5E0" stroke-width="2" fill="#F7FAFC"/>
    <text x="50" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748">GROUND FLOOR</text>
    
    <!-- Rooms -->
    <rect x="40" y="60" width="130" height="100" stroke="#E2E8F0"/> <text x="105" y="115" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">LIVING ROOM</text>
    <rect x="170" y="60" width="130" height="100" stroke="#E2E8F0"/> <text x="235" y="115" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">KITCHEN</text>
    <rect x="40" y="160" width="260" height="140" stroke="#E2E8F0"/> <text x="170" y="235" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">DINING / OUTDOOR</text>
    
    <!-- Intercom Pins -->
    <circle cx="235" cy="80" r="6" fill="#3182CE"/> <!-- Kitchen -->
    <circle cx="105" cy="80" r="6" fill="#3182CE"/> <!-- Living -->
  </g>
  
  <!-- First Floor (Right) -->
  <g id="first-floor">
    <rect x="340" y="60" width="260" height="240" stroke="#CBD5E0" stroke-width="2" fill="#F7FAFC"/>
    <text x="350" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748">FIRST FLOOR</text>
    
    <!-- Rooms -->
    <rect x="340" y="60" width="130" height="120" stroke="#E2E8F0"/> <text x="405" y="125" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">MASTER BDRM</text>
    <rect x="470" y="60" width="130" height="120" stroke="#E2E8F0"/> <text x="535" y="125" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">BEDROOM 2</text>
    <rect x="340" y="180" width="260" height="120" stroke="#E2E8F0"/> <text x="470" y="245" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">BEDROOM 3 / STUDY</text>
    
    <!-- Intercom Pins -->
    <circle cx="405" cy="80" r="6" fill="#3182CE"/> <!-- Master -->
    <circle cx="535" cy="220" r="6" fill="#3182CE"/> <!-- BDRM 3 -->
  </g>
  
  <!-- External Gate Pins -->
  <rect x="40" y="320" width="260" height="20" fill="#EDF2F7"/> <!-- Gate Wall -->
  <circle cx="50" cy="330" r="6" fill="#E53E3E"/> <!-- Main Gate -->
  <text x="65" y="335" font-family="Arial, sans-serif" font-size="9" fill="#2D3748">Main Gate Station</text>
  
  <circle cx="220" cy="330" r="6" fill="#E53E3E"/> <!-- Side Gate -->
  <text x="235" y="335" font-family="Arial, sans-serif" font-size="9" fill="#2D3748">Side Gate Station</text>
  
  <!-- Legend -->
  <rect x="460" y="320" width="140" height="30" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <circle cx="475" cy="335" r="4" fill="#3182CE"/> <text x="485" y="339" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Indoor Monitor</text>
  <circle cx="535" cy="335" r="4" fill="#E53E3E"/> <text x="546" y="339" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Door Station</text>
  
  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Strategic Intercom Placement: 2-Storey Landed Home</text>
</svg>
