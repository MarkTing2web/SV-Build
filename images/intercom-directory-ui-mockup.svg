<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Sleek Frame (Sliver/Grey) -->
  <rect x="25" y="25" width="350" height="350" rx="20" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="2"/>
  <rect x="35" y="35" width="330" height="330" rx="15" fill="#1A202C"/> <!-- Screen Area -->
  
  <!-- UI Background -->
  <rect x="40" y="40" width="320" height="320" rx="10" fill="white"/>
  
  <!-- Header / Search Bar -->
  <rect x="40" y="40" width="320" height="60" rx="10 10 0 0" fill="#EDF2F7"/>
  <text x="60" y="75" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">Directory</text>
  <rect x="180" y="55" width="160" height="30" rx="15" fill="white" stroke="#CBD5E0"/>
  <text x="200" y="75" font-family="Arial, sans-serif" font-size="12" fill="#A0AEC0">Search...</text>
  
  <!-- Contact List Entries -->
  <!-- 1. Manager's Office -->
  <g id="contact1">
    <rect x="40" y="100" width="320" height="60" fill="white" stroke="#EDF2F7"/>
    <circle cx="65" cy="130" r="18" fill="#BEE3F8"/>
    <text x="65" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0" text-anchor="middle">MO</text>
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Manager's Office</text>
    <text x="100" y="142" font-family="Arial, sans-serif" font-size="11" fill="#718096">Room 05-01 • 经理办公室</text>
    <rect x="280" y="115" width="60" height="30" rx="15" fill="#48BB78"/> <!-- Call Button -->
    <text x="310" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Call</text>
    <circle cx="90" cy="148" r="4" fill="#48BB78"/> <!-- Status -->
  </g>
  
  <!-- 2. Reception (Mr. Lim) -->
  <g id="contact2">
    <rect x="40" y="160" width="320" height="60" fill="#F7FAFC" stroke="#EDF2F7"/>
    <circle cx="65" cy="190" r="18" fill="#BEE3F8"/>
    <text x="65" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0" text-anchor="middle">RL</text>
    <text x="100" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Reception (Mr. Lim)</text>
    <text x="100" y="202" font-family="Arial, sans-serif" font-size="11" fill="#718096">Ground Floor • 林先生</text>
    <rect x="280" y="175" width="60" height="30" rx="15" fill="#48BB78"/>
    <text x="310" y="195" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Call</text>
    <circle cx="90" cy="208" r="4" fill="#48BB78"/>
  </g>
  
  <!-- 3. Security Command -->
  <g id="contact3">
    <rect x="40" y="220" width="320" height="60" fill="white" stroke="#EDF2F7"/>
    <circle cx="65" cy="250" r="18" fill="#BEE3F8"/>
    <text x="65" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0" text-anchor="middle">SC</text>
    <text x="100" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Security Command</text>
    <text x="100" y="262" font-family="Arial, sans-serif" font-size="11" fill="#718096">B1 Control Room • 安保中心</text>
    <rect x="280" y="235" width="60" height="30" rx="15" fill="#A0AEC0"/> <!-- Offline -->
    <text x="310" y="255" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Offline</text>
    <circle cx="90" cy="268" r="4" fill="#E53E3E"/>
  </g>
  
  <!-- 4. Warehouse -->
  <g id="contact4">
    <rect x="40" y="280" width="320" height="60" fill="white" stroke="#EDF2F7"/>
    <circle cx="65" cy="310" r="18" fill="#BEE3F8"/>
    <text x="65" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0" text-anchor="middle">WH</text>
    <text x="100" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Warehouse</text>
    <text x="100" y="322" font-family="Arial, sans-serif" font-size="11" fill="#718096">Logistics Dock • 仓库</text>
    <rect x="280" y="295" width="60" height="30" rx="15" fill="#48BB78"/>
    <text x="310" y="315" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Call</text>
    <circle cx="90" cy="328" r="4" fill="#48BB78"/>
  </g>
  
  <!-- Bottom Tab Bar -->
  <rect x="40" y="340" width="320" height="20" rx="0 0 10 10" fill="#F7FAFC"/>
  <rect x="180" y="348" width="40" height="4" rx="2" fill="#E2E8F0"/> <!-- Scroll bar handle -->
  
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#718096" text-anchor="middle">Mockup: Modern Multi-Lingual Station Directory</text>
</svg>
