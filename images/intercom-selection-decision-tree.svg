<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- START: How many doors? -->
  <path d="M40 180 L80 140 L120 180 L80 220 Z" fill="#EBF8FF" stroke="#3182CE" stroke-width="2"/>
  <text x="80" y="175" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">How many</text>
  <text x="80" y="188" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">doors?</text>
  
  <!-- Path A: Single Door -->
  <path d="M120 180 L180 120" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="145" y="145" font-family="Arial, sans-serif" font-size="8" fill="#718096" transform="rotate(-45 145 145)">1 Door</text>
  
  <!-- Path B: Multiple Doors -->
  <path d="M120 180 L180 240" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="145" y="215" font-family="Arial, sans-serif" font-size="8" fill="#718096" transform="rotate(45 145 215)">2+ Doors</text>
  
  <!-- Decision 2: Audio/Video? -->
  <path d="M180 120 L220 80 L260 120 L220 160 Z" fill="#EBF8FF" stroke="#3182CE" stroke-width="2"/>
  <text x="220" y="125" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Audio or</text>
  <text x="220" y="138" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Video?</text>
  
  <!-- Decision 3: Mobile App? -->
  <path d="M180 240 L220 200 L260 240 L220 280 Z" fill="#EBF8FF" stroke="#3182CE" stroke-width="2"/>
  <text x="220" y="235" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Mobile App</text>
  <text x="220" y="248" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">Needed?</text>
  
  <!-- Terminal Recommendations -->
  <!-- Top: Basic Audio -->
  <path d="M260 120 L320 80" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="285" y="95" font-family="Arial, sans-serif" font-size="8" fill="#718096">Audio</text>
  <rect x="320" y="50" width="120" height="40" rx="4" fill="#3182CE"/>
  <text x="380" y="70" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Basic Audio System</text>
  <text x="380" y="82" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle">(Budget Option)</text>
  
  <!-- Mid-Top: Standard Video -->
  <path d="M260 120 L320 150" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="285" y="145" font-family="Arial, sans-serif" font-size="8" fill="#718096">Video</text>
  <rect x="320" y="140" width="120" height="40" rx="4" fill="#3182CE"/>
  <text x="380" y="160" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Analogue Video</text>
  <text x="380" y="172" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle">(Reliable Standard)</text>
  
  <!-- Mid-Bottom: IP Video -->
  <path d="M260 240 L320 210" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="285" y="220" font-family="Arial, sans-serif" font-size="8" fill="#718096">Yes</text>
  <rect x="320" y="200" width="120" height="40" rx="4" fill="#2B6CB0"/>
  <text x="380" y="220" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">IP Video + App</text>
  <text x="380" y="232" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle">(Modern Family)</text>
  
  <!-- Bottom: Cloud Smart -->
  <path d="M260 240 L320 280" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="285" y="275" font-family="Arial, sans-serif" font-size="8" fill="#718096">No</text>
  <rect x="320" y="270" width="120" height="40" rx="4" fill="#1A365D"/>
  <text x="380" y="290" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Cloud / Smart System</text>
  <text x="380" y="302" font-family="Arial, sans-serif" font-size="8" fill="#BEE3F8" text-anchor="middle">(Premium Scaling)</text>
  
  <!-- Summary / Legend -->
  <text x="520" y="180" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748">Decision Factors:</text>
  <text x="520" y="200" font-family="Arial, sans-serif" font-size="9" fill="#718096">• Installation (Wired/WiFi)</text>
  <text x="520" y="215" font-family="Arial, sans-serif" font-size="9" fill="#718096">• Property Size (Range)</text>
  <text x="520" y="230" font-family="Arial, sans-serif" font-size="9" fill="#718096">• Budget ($800 - $6,000)</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E0"/>
    </marker>
  </defs>
  
  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Residential Intercom Selection: Decision Framework</text>
</svg>
