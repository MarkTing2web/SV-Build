<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Central Controller -->
  <rect x="150" y="160" width="100" height="80" rx="8" fill="#1A365D"/>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Controller /</text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Power Supply</text>
  
  <!-- Intercom Stations (Periphery) -->
  <!-- Top Left Station -->
  <rect x="40" y="40" width="80" height="60" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="80" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Intercom</text>
  <text x="80" y="90" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Station 1</text>
  
  <!-- Top Right Station -->
  <rect x="280" y="40" width="80" height="60" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="320" y="75" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Intercom</text>
  <text x="320" y="90" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Station 2</text>
  
  <!-- Bottom Left Station -->
  <rect x="40" y="300" width="80" height="60" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="80" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Intercom</text>
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Station 3</text>
  
  <!-- Bottom Right Station -->
  <rect x="280" y="300" width="80" height="60" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="320" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Intercom</text>
  <text x="320" y="350" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Station 4</text>
  
  <!-- Dedicated Cable Runs (Arrows) -->
  <!-- Top Left -->
  <line x1="150" y1="170" x2="110" y2="100" stroke="#3182CE" stroke-width="2"/>
  <text x="110" y="150" font-family="Arial, sans-serif" font-size="9" fill="#2B6CB0" transform="rotate(-30 110 150)">Dedicated Cable Run</text>
  
  <!-- Top Right -->
  <line x1="250" y1="170" x2="290" y2="100" stroke="#3182CE" stroke-width="2"/>
  <text x="260" y="130" font-family="Arial, sans-serif" font-size="9" fill="#2B6CB0" transform="rotate(30 260 130)">Dedicated Cable Run</text>
  
  <!-- Bottom Left -->
  <line x1="150" y1="230" x2="110" y2="300" stroke="#3182CE" stroke-width="2"/>
  <text x="80" y="270" font-family="Arial, sans-serif" font-size="9" fill="#2B6CB0" transform="rotate(30 80 270)">Dedicated Cable Run</text>
  
  <!-- Bottom Right -->
  <line x1="250" y1="230" x2="290" y2="300" stroke="#3182CE" stroke-width="2"/>
  <text x="270" y="270" font-family="Arial, sans-serif" font-size="9" fill="#2B6CB0" transform="rotate(-30 270 270)">Dedicated Cable Run</text>
</svg>
