<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Top Tier: Master Station -->
  <rect x="220" y="20" width="200" height="100" rx="8" fill="#1A365D"/>
  <text x="320" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">MASTER STATION</text>
  <text x="320" y="75" font-family="Arial, sans-serif" font-size="10" fill="#BEE3F8" text-anchor="middle">Full Features: Call, Monitor, Broadcast</text>
  <text x="320" y="90" font-family="Arial, sans-serif" font-size="10" fill="#BEE3F8" text-anchor="middle">Global Directory & System Config</text>
  
  <!-- Tier 2: Substations -->
  <rect x="40" y="160" width="160" height="80" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="120" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">SUBSTATION 1</text>
  <text x="120" y="215" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call + Answer Only</text>
  
  <rect x="240" y="160" width="160" height="80" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="320" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">SUBSTATION 2</text>
  <text x="320" y="215" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call + Answer Only</text>
  
  <rect x="440" y="160" width="160" height="80" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="520" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">SUBSTATION 3</text>
  <text x="520" y="215" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call + Answer Only</text>
  
  <!-- Bottom Tier: Door Station -->
  <rect x="240" y="280" width="160" height="50" rx="4" fill="#2D3748"/>
  <text x="320" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">DOOR STATION</text>
  <text x="320" y="320" font-family="Arial, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">(Visitor Call Point)</text>
  
  <!-- Hierarchy Arrows -->
  <path d="M320 120 L320 160" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M320 120 L120 160" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M320 120 L520 160" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Door Station Arrows -->
  <path d="M120 240 L300 280" stroke="#718096" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowheadGrey)"/>
  <path d="M320 240 L320 280" stroke="#718096" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowheadGrey)"/>
  <path d="M520 240 L340 280" stroke="#718096" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowheadGrey)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE"/>
    </marker>
    <marker id="arrowheadGrey" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#718096"/>
    </marker>
  </defs>
  
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D">SYSTEM HIERARCHY</text>
</svg>
