<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Sleek Tablet Frame -->
  <rect x="50" y="100" width="300" height="200" rx="8" fill="#1A202C" stroke="#CBD5E0" stroke-width="2"/>
  <rect x="60" y="110" width="280" height="160" rx="2" fill="#2D3748"/> <!-- Screen -->
  
  <!-- Image on Screen (Visitor View) -->
  <rect x="60" y="110" width="280" height="160" fill="#E2E8F0" fill-opacity="0.8"/>
  <circle cx="200" cy="170" r="30" fill="#A0AEC0"/> <!-- Person head -->
  <path d="M150 240 Q200 190 250 240" stroke="#718096" stroke-width="4" fill="none"/> <!-- Shoulders -->
  <path d="M60 250 L340 250 L340 270 L60 270 Z" fill="#2D3748" fill-opacity="0.6"/> <!-- Overlay bar -->
  <text x="75" y="262" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">ENTRY GATE 1 • 2026-03-29 17:55</text>
  
  <!-- Touch Buttons (Bottom/Right) -->
  <circle cx="200" cy="285" r="8" fill="#48BB78"/> <!-- Talk -->
  <circle cx="230" cy="285" r="8" fill="#E53E3E"/> <!-- Hang up -->
  <circle cx="170" cy="285" r="8" fill="#3182CE"/> <!-- Capture -->
  
  <!-- Housing LEDs -->
  <circle cx="340" cy="110" r="2" fill="#48BB78"/> <!-- Power ON -->
  
  <!-- Speaker/Mic Points -->
  <line x1="60" y1="285" x2="100" y2="285" stroke="#4A5568" stroke-width="1" stroke-dasharray="2 2"/>

  <text x="200" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D" text-anchor="middle">7-Inch Hands-Free Color Video Monitor</text>
</svg>
