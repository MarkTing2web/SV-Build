<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Left Side: Locked -->
  <g id="locked">
    <rect x="25" y="40" width="150" height="280" rx="4" fill="#F7FAFC" stroke="#CBD5E0"/>
    <text x="100" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Locked (De-Energised)</text>
    
    <!-- Faceplate and Strike Housing -->
    <rect x="150" y="80" width="20" height="200" fill="#A0AEC0"/>
    <rect x="120" y="100" width="30" height="100" fill="#718096"/>
    
    <!-- Latch Bolt (Moving Door) -->
    <rect x="175" y="125" width="40" height="40" rx="2" fill="#2D3748"/>
    
    <!-- Strike Keeper (Locked Position) -->
    <rect x="150" y="120" width="10" height="60" fill="#E53E3E"/>
    
    <text x="105" y="225" font-family="Arial, sans-serif" font-size="9" fill="#2D3748" text-anchor="middle" font-weight="bold">KEEPER RIGID</text>
  </g>
  
  <!-- Right Side: Unlocked -->
  <g id="unlocked">
    <rect x="225" y="40" width="150" height="280" rx="4" fill="#F0FFF4" stroke="#38A169"/>
    <text x="300" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Unlocked (Energised)</text>
    
    <!-- Faceplate and Strike Housing -->
    <rect x="350" y="80" width="20" height="200" fill="#A0AEC0"/>
    <rect x="320" y="100" width="30" height="100" fill="#718096"/>
    
    <!-- Latch Bolt (Passing Through) -->
    <rect x="345" y="125" width="40" height="40" rx="2" fill="#2D3748" fill-opacity="0.3"/>
    <path d="M365 145 L395 145" stroke="#38A169" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Strike Keeper (Released Position) -->
    <rect x="350" y="120" width="60" height="10" rx="1" fill="#38A169" transform="rotate(-45 350 120)"/>
    
    <text x="305" y="225" font-family="Arial, sans-serif" font-size="9" fill="#2D3748" text-anchor="middle" font-weight="bold">KEEPER PIVOTS</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#38A169"/>
    </marker>
  </defs>
  
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Electric Strike Operation</text>
</svg>
