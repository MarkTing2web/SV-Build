<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Vertical Divider -->
  <line x1="250" y1="40" x2="250" y2="320" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Left Side: RESIDENTIAL (Simple) -->
  <g id="residential">
    <rect x="20" y="40" width="210" height="280" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
    <text x="125" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#718096" text-anchor="middle">RESIDENTIAL FLOW</text>
    
    <!-- Step 1: Gate -->
    <rect x="75" y="90" width="100" height="60" rx="4" fill="white" stroke="#CBD5E0"/>
    <text x="125" y="115" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Gate Door Station</text>
    <path d="M125 150 L125 210" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
    
    <!-- Step 2: Unit -->
    <rect x="75" y="210" width="100" height="60" rx="4" fill="white" stroke="#3182CE" stroke-width="2"/>
    <text x="125" y="138" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Direct Call</text>
    <text x="125" y="235" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Unit Monitor</text>
    <text x="125" y="250" font-family="Arial, sans-serif" font-size="9" fill="#3182CE" text-anchor="middle">Answer & Release</text>
  </g>
  
  <!-- Right Side: COMMERCIAL OFFICE (Complex) -->
  <g id="commercial">
    <rect x="270" y="40" width="350" height="280" rx="8" fill="#EBF8FF" stroke="#BEE3F8"/>
    <text x="445" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C5282" text-anchor="middle">COMMERCIAL OFFICE FLOW</text>
    
    <!-- Step 1: Entrance -->
    <rect x="290" y="90" width="100" height="50" rx="4" fill="white" stroke="#CBD5E0"/>
    <text x="340" y="115" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Entrance Panel</text>
    <path d="M390 115 L420 115" stroke="#3182CE" stroke-width="1.5" marker-end="url(#aH)"/>
    
    <!-- Step 2: Reception -->
    <rect x="420" y="90" width="100" height="50" rx="4" fill="white" stroke="#3182CE" stroke-width="2"/>
    <text x="470" y="115" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Reception Desk</text>
    <path d="M470 140 L470 180" stroke="#3182CE" stroke-width="1.5" marker-end="url(#aH)"/>
    
    <!-- Step 3: VMS -->
    <rect x="420" y="180" width="100" height="50" rx="4" fill="#2B6CB0"/>
    <text x="470" y="200" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Visitor Management</text>
    <text x="470" y="212" font-family="Arial, sans-serif" font-size="7" fill="#BEE3F8" text-anchor="middle">(VMS) Integrations</text>
    <path d="M420 205 L340 205 L340 240" stroke="#3182CE" stroke-width="1.5" marker-end="url(#aH)"/>
    <path d="M520 205 L580 205 L580 240" stroke="#3182CE" stroke-width="1.5" marker-end="url(#aH)"/>
    
    <!-- Step 4: Staff Notification -->
    <rect x="290" y="240" width="100" height="50" rx="4" fill="white" stroke="#CBD5E0"/>
    <text x="340" y="260" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2D3748" text-anchor="middle">Staff Smartphone</text>
    <text x="340" y="272" font-family="Arial, sans-serif" font-size="7" fill="#718096" text-anchor="middle">(VoIP Notification)</text>
    
    <rect x="530" y="240" width="100" height="50" rx="4" fill="white" stroke="#CBD5E0"/>
    <text x="580" y="260" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2D3748" text-anchor="middle">Office Desk Phone</text>
    <text x="580" y="272" font-family="Arial, sans-serif" font-size="7" fill="#718096" text-anchor="middle">(SIP Transfer)</text>
  </g>
  
  <defs>
    <marker id="aH" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="currentColor"/>
    </marker>
  </defs>
  
  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Residential vs Commercial Office Intercom Workflow</text>
</svg>
