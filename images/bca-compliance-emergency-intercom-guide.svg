<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Building Outline (Cross-section) -->
  <rect x="100" y="40" width="300" height="280" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="2"/>
  
  <!-- Floors -->
  <line x1="100" y1="96" x2="400" y2="96" stroke="#CBD5E0" stroke-width="1.5"/> <!-- L4 -->
  <line x1="100" y1="152" x2="400" y2="152" stroke="#CBD5E0" stroke-width="1.5"/> <!-- L3 -->
  <line x1="100" y1="208" x2="400" y2="208" stroke="#CBD5E0" stroke-width="1.5"/> <!-- L2 -->
  <line x1="100" y1="264" x2="400" y2="264" stroke="#CBD5E0" stroke-width="2"/> <!-- L1 (Ground) -->
  
  <!-- Floor Labels -->
  <text x="80" y="75" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#718096" text-anchor="end">LEVEL 4</text>
  <text x="80" y="131" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#718096" text-anchor="end">LEVEL 3</text>
  <text x="80" y="187" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#718096" text-anchor="end">LEVEL 2</text>
  <text x="80" y="243" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="end">GROUND</text>
  <text x="80" y="299" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#718096" text-anchor="end">CARPARK B1</text>
  
  <!-- Elevator Shaft -->
  <rect x="120" y="40" width="40" height="280" fill="#EDF2F7"/>
  <rect x="125" y="70" width="30" height="40" fill="#CBD5E0"/> <!-- Lift Car -->
  
  <!-- Stairwell -->
  <path d="M360 40 L400 40 L400 320 L360 320 Z" fill="#EDF2F7"/>
  <path d="M370 40 L390 40 L390 320 L370 320" stroke="#CBD5E0" stroke-width="1" stroke-dasharray="4 4"/>
  
  <!-- Emergency Intercom Icons (Red) -->
  <!-- 1. Lift -->
  <circle cx="140" cy="90" r="6" fill="#E53E3E"/>
  <text x="140" y="90" font-family="Arial, sans-serif" font-size="6" fill="white" font-weight="bold" text-anchor="middle">SOS</text>
  <text x="145" y="65" font-family="Arial, sans-serif" font-size="7" fill="#E53E3E" font-weight="bold">LIFT CAR</text>
  
  <!-- 2. Stairwell -->
  <circle cx="380" cy="180" r="6" fill="#E53E3E"/>
  <text x="380" y="124" font-family="Arial, sans-serif" font-size="7" fill="#E53E3E" font-weight="bold" text-anchor="middle">STAIRWELL</text>
  
  <!-- 3. Accessible Toilet (Ground) -->
  <circle cx="300" cy="245" r="6" fill="#E53E3E"/>
  <text x="300" y="235" font-family="Arial, sans-serif" font-size="7" fill="#E53E3E" font-weight="bold" text-anchor="middle">ACCESSIBLE TOILET</text>
  
  <!-- 4. Carpark -->
  <circle cx="200" cy="295" r="6" fill="#E53E3E"/>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="7" fill="#E53E3E" font-weight="bold" text-anchor="middle">CARPARK CALL POINT</text>
  
  <!-- Compliance Notes -->
  <rect x="420" y="60" width="200" height="240" rx="8" fill="#FFF5F5" stroke="#FEB2B2"/>
  <text x="520" y="85" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C53030" text-anchor="middle">BCA COMPLIANCE</text>
  
  <rect x="430" y="100" width="180" height="35" rx="4" fill="white" stroke="#FED7D7"/>
  <text x="440" y="115" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2D3748">Lifts: 24/7 Monitoring</text>
  <text x="440" y="125" font-family="Arial, sans-serif" font-size="7" fill="#718096">BCA Clause 15.3.4 (Emergency Comm)</text>
  
  <rect x="430" y="145" width="180" height="35" rx="4" fill="white" stroke="#FED7D7"/>
  <text x="440" y="160" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2D3748">Toilets: 400mm Pull Cord</text>
  <text x="440" y="170" font-family="Arial, sans-serif" font-size="7" fill="#718096">Code on Barrier-Free Accessibility</text>
  
  <rect x="430" y="190" width="180" height="35" rx="4" fill="white" stroke="#FED7D7"/>
  <text x="440" y="205" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2D3748">Stairwells: FCC Integrated</text>
  <text x="440" y="215" font-family="Arial, sans-serif" font-size="7" fill="#718096">Fire Safety Act Compliance</text>

  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Emergency Intercom Placement & BCA Regulatory Guide</text>
</svg>
