<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="640" height="360" fill="white"/>
  
  <!-- Path Line (Internet Backbone) -->
  <path d="M100 140 L540 140" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- 1. Door Station -->
  <rect x="40" y="110" width="80" height="60" rx="8" fill="#1A365D"/>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Door Station</text>
  <circle cx="80" cy="130" r="10" fill="#2D3748"/> <!-- Lens -->
  <rect x="70" y="145" width="20" height="10" rx="1" fill="#4A5568"/> <!-- Speaker -->
  
  <!-- 2. Internet -->
  <circle cx="230" cy="140" r="30" fill="#38B2AC" fill-opacity="0.1" stroke="#38B2AC" stroke-width="2"/>
  <text x="230" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Internet</text>
  <path d="M210 140 A20 20 0 0 1 250 140 M210 135 A25 25 0 0 1 250 135 M220 140 A10 10 0 0 1 240 140" stroke="#38B2AC" stroke-width="2" fill="none"/> <!-- Globe arcs -->
  
  <!-- 3. Cloud Server -->
  <path d="M350 140 C350 120 370 110 390 110 C400 100 420 100 430 110 C450 110 470 120 470 140" fill="#3182CE"/>
  <rect x="350" y="140" width="120" height="30" fill="#3182CE"/>
  <text x="410" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Cloud Server</text>
  
  <!-- 4. Resident App -->
  <rect x="520" y="100" width="60" height="100" rx="10" fill="#2D3748"/>
  <rect x="525" y="110" width="50" height="80" rx="2" fill="white"/>
  <text x="550" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">App</text>
  <text x="550" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Resident App</text>
  
  <!-- 5. Admin Portal (Down-branch) -->
  <path d="M410 170 L410 250 L480 250" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="490" y="230" width="90" height="60" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <rect x="500" y="240" width="70" height="40" rx="1" fill="#A0AEC0"/> <!-- Screen -->
  <text x="535" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Admin Portal</text>
  
  <!-- Connection Arrows -->
  <!-- Station to Internet -->
  <path d="M130 140 L195 140" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Internet to Cloud -->
  <path d="M265 140 L345 140" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Cloud to App -->
  <path d="M475 140 L515 140" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE" />
    </marker>
  </defs>
  
  <!-- Protocol Labels -->
  <text x="162" y="130" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">SIP Video</text>
  <text x="305" y="130" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">HTTPS/WSS</text>
  <text x="495" y="130" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">Push Notification</text>
</svg>
