<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Step 1: Arrival -->
  <rect x="20" y="40" width="100" height="50" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="70" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">1. Visitor Arrives</text>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">at Lobby Panel</text>
  
  <!-- Step 2: Directory -->
  <rect x="140" y="40" width="100" height="50" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="190" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">2. Unit Search</text>
  <text x="190" y="78" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Touchscreen Directory</text>
  
  <!-- Step 3: Routing -->
  <rect x="260" y="40" width="100" height="50" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="310" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">3. Call Routed</text>
  <text x="310" y="78" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">via Server / Cloud</text>
  
  <!-- Step 4: Ring -->
  <rect x="380" y="40" width="100" height="50" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="430" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">4. Unit Rings</text>
  <text x="430" y="78" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Monitor + Mobile</text>
  
  <!-- Step 5: Answer -->
  <rect x="500" y="40" width="100" height="50" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="550" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">5. Resident Answers</text>
  
  <!-- Step 6: Video -->
  <rect x="20" y="140" width="100" height="50" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="70" y="165" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282" text-anchor="middle">6. Two-Way Video</text>
  
  <!-- Step 7: Unlock -->
  <rect x="140" y="140" width="100" height="50" rx="8" fill="#2B6CB0"/>
  <text x="190" y="170" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">7. DOOR RELEASE</text>
  
  <!-- Step 8: Logging -->
  <rect x="260" y="140" width="100" height="50" rx="8" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="310" y="165" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4A5568" text-anchor="middle">8. Event Logged</text>
  <text x="310" y="178" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Snapshot + Time</text>
  
  <!-- Step 9: Open -->
  <rect x="380" y="140" width="100" height="50" rx="8" fill="#38A169"/>
  <text x="430" y="170" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">9. GATE OPENS</text>
  
  <!-- Connectors -->
  <path d="M120 65 L140 65" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M240 65 L260 65" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M360 65 L380 65" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M480 65 L500 65" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  
  <path d="M550 90 L550 115 L70 115 L70 140" stroke="#CBD5E0" stroke-width="1.5" stroke-dasharray="4 2"/>
  
  <path d="M120 165 L140 165" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M240 165 L260 165" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M360 165 L380 165" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  
  <defs>
    <marker id="aH" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="currentColor"/>
    </marker>
  </defs>
  
  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Condominium Intercom: End-to-End Call Sequence Flow</text>
</svg>
