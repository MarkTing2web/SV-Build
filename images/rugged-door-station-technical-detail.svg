<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Door Station Housing (Stainless Steel) -->
  <linearGradient id="metal" x1="100" y1="50" x2="300" y2="350" gradientUnits="userSpaceOnWrite">
    <stop offset="0%" stop-color="#E2E8F0"/>
    <stop offset="50%" stop-color="#CBD5E0"/>
    <stop offset="100%" stop-color="#A0AEC0"/>
  </linearGradient>
  
  <rect x="100" y="50" width="200" height="300" rx="4" fill="url(#metal)" stroke="#718096" stroke-width="2"/>
  
  <!-- 1. HD Camera & IR LEDs -->
  <rect x="120" y="70" width="160" height="80" rx="4" fill="#1A202C"/>
  <circle cx="200" cy="110" r="25" fill="#2D3748" stroke="#4A5568"/>
  <circle cx="200" cy="110" r="8" fill="#1A365D"/> <!-- Lens -->
  <circle cx="200" cy="110" r="3" fill="#3182CE"/>
  
  <!-- IR LEDs -->
  <circle cx="145" cy="110" r="5" fill="#702459" fill-opacity="0.6"/>
  <circle cx="165" cy="110" r="5" fill="#702459" fill-opacity="0.6"/>
  <circle cx="235" cy="110" r="5" fill="#702459" fill-opacity="0.6"/>
  <circle cx="255" cy="110" r="5" fill="#702459" fill-opacity="0.6"/>
  
  <!-- 2. RFID Reader -->
  <rect x="130" y="170" width="140" height="60" rx="2" fill="#2D3748" fill-opacity="0.2" stroke="#4A5568" stroke-dasharray="2 2"/>
  <path d="M180 200 Q200 180 220 200" stroke="#3182CE" stroke-width="2" fill="none"/> <!-- NFC Icon -->
  <path d="M185 205 Q200 190 215 205" stroke="#3182CE" stroke-width="1.5" fill="none"/>
  
  <!-- 3. Call Button -->
  <circle cx="200" cy="270" r="30" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="2"/>
  <path d="M190 260 L210 260 L210 285 L190 285 Z" fill="#2B6CB0"/> <!-- Bell icon simplified -->
  <circle cx="200" cy="285" r="5" fill="#2B6CB0"/>
  
  <!-- 4. Speaker Grille -->
  <g id="grille">
    <line x1="130" y1="310" x2="270" y2="310" stroke="#4A5568" stroke-width="1"/>
    <line x1="130" y1="315" x2="270" y2="315" stroke="#4A5568" stroke-width="1"/>
    <line x1="130" y1="320" x2="270" y2="320" stroke="#4A5568" stroke-width="1"/>
    <line x1="130" y1="325" x2="270" y2="325" stroke="#4A5568" stroke-width="1"/>
  </g>
  
  <!-- CALLOUTS -->
  <g id="callouts" font-family="Arial, sans-serif" font-size="10" font-weight="bold">
    <!-- Camera -->
    <path d="M180 110 L50 110" stroke="#E53E3E" stroke-width="1" marker-start="url(#dot)"/>
    <text x="45" y="114" fill="#E53E3E" text-anchor="end">Wide-Angle HD Camera</text>
    
    <!-- IR LEDs -->
    <path d="M150 100 L50 80" stroke="#E53E3E" stroke-width="1" marker-start="url(#dot)"/>
    <text x="45" y="84" fill="#E53E3E" text-anchor="end">Infrared (IR) LEDs</text>
    
    <!-- RFID -->
    <path d="M260 200 L350 200" stroke="#3182CE" stroke-width="1" marker-start="url(#dot)"/>
    <text x="355" y="204" fill="#3182CE">RFID / NFC Card Reader</text>
    
    <!-- Gasket -->
    <path d="M300 300 L350 320" stroke="#48BB78" stroke-width="1" marker-start="url(#dot)"/>
    <text x="355" y="324" fill="#38A169">IP65 Weather Seal (Internal Gasket)</text>
    
    <!-- Housing -->
    <path d="M100 200 L50 200" stroke="#4A5568" stroke-width="1" marker-start="url(#dot)"/>
    <text x="45" y="204" fill="#4A5568" text-anchor="end">Stainless Steel 316L</text>
  </g>

  <defs>
    <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
      <circle cx="2" cy="2" r="2" fill="#2D3748"/>
    </marker>
  </defs>
  
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D" text-anchor="middle">Ruggedized Door Station: Construction & Components</text>
</svg>
