<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Intercom Controller (Left) -->
  <rect x="40" y="100" width="140" height="120" rx="8" fill="#1A365D"/>
  <text x="110" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Intercom Station</text>
  <rect x="60" y="150" width="100" height="40" rx="2" fill="#2D3748"/>
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">COM</text>
  <text x="140" y="170" font-family="Arial, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">NO</text>
  
  <!-- Gate Motor Board (Right) -->
  <rect x="360" y="100" width="160" height="120" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="440" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Gate Motor PCB</text>
  <rect x="380" y="150" width="120" height="40" rx="2" fill="#A0AEC0"/>
  <text x="405" y="170" font-family="Arial, sans-serif" font-size="10" fill="#2D3748" text-anchor="middle">TRG</text>
  <text x="475" y="170" font-family="Arial, sans-serif" font-size="10" fill="#2D3748" text-anchor="middle">GND</text>
  
  <!-- Wiring (2-Core) -->
  <path d="M80 170 L200 170 L200 170 L405 170" stroke="#E53E3E" stroke-width="2" fill="none"/> <!-- Red Wire (Trigger) -->
  <path d="M140 170 L220 170 L220 190 L475 190 L475 170" stroke="#2D3748" stroke-width="2" fill="none"/> <!-- Black Wire (Common) -->
  
  <!-- Labels -->
  <text x="270" y="160" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E53E3E" text-anchor="middle">Dry Contact Signal</text>
  
  <!-- Gate Icon (Far Right) -->
  <rect x="560" y="100" width="10" height="100" fill="#4A5568"/> <!-- Pillar -->
  <rect x="570" y="120" width="50" height="60" fill="#718096" fill-opacity="0.5"/> <!-- Gate Leaf -->
  <path d="M580 180 Q610 180 620 150" stroke="#3182CE" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/> <!-- Opening arrow -->

  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#3182CE"/>
    </marker>
  </defs>
  
  <text x="320" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Intercom to Gate Motor Trigger Schematic</text>
</svg>
