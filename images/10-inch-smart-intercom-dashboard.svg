<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Premium 10" Slate Frame -->
  <rect x="25" y="75" width="350" height="250" rx="4" fill="#171923" stroke="#2D3748" stroke-width="2"/>
  <rect x="35" y="85" width="330" height="230" fill="#1A202C"/> <!-- Display -->
  
  <!-- UI Dashboard (Android Experience) -->
  <rect x="45" y="95" width="310" height="210" fill="#F7FAFC" rx="2"/>
  
  <!-- Header / Weather / Time -->
  <rect x="45" y="95" width="310" height="40" fill="#2B6CB0"/>
  <text x="60" y="122" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">17:55 PM</text>
  <text x="340" y="122" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="end">Singpaore • 31°C ☁️</text>
  
  <!-- App Icon Tiles (Android Layout) -->
  <g id="tiles">
    <!-- Row 1 -->
    <rect x="65" y="150" width="60" height="60" rx="10" fill="#2B6CB0" fill-opacity="0.1" stroke="#2B6CB0"/>
    <path d="M85 170 L105 170 L105 190 L85 190 Z" fill="#2B6CB0"/> <!-- Intercom Icon -->
    <text x="95" y="222" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Intercom</text>
    
    <rect x="135" y="150" width="60" height="60" rx="10" fill="#38A169" fill-opacity="0.1" stroke="#38A169"/>
    <circle cx="165" cy="180" r="10" fill="#38A169"/> <!-- CCTV Icon -->
    <text x="165" y="222" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">CCTV View</text>
    
    <rect x="205" y="150" width="60" height="60" rx="10" fill="#DD6B20" fill-opacity="0.1" stroke="#DD6B20"/>
    <path d="M225 180 L245 180" stroke="#DD6B20" stroke-width="2"/> <!-- Smart Home Icon -->
    <text x="235" y="222" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Smart Home</text>
    
    <rect x="275" y="150" width="60" height="60" rx="10" fill="#805AD5" fill-opacity="0.1" stroke="#805AD5"/>
    <path d="M295 180 Q305 170 315 180" stroke="#805AD5" stroke-width="2" fill="none"/> <!-- Elevator Icon -->
    <text x="305" y="222" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Elevator</text>
    
    <!-- Row 2 -->
    <rect x="65" y="240" width="60" height="40" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
    <text x="95" y="265" font-family="Arial, sans-serif" font-size="8" fill="#4A5568" text-anchor="middle">Settings</text>
    
    <rect x="135" y="240" width="60" height="40" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
    <text x="165" y="265" font-family="Arial, sans-serif" font-size="8" fill="#4A5568" text-anchor="middle">Log</text>
    
    <rect x="205" y="240" width="130" height="40" rx="6" fill="#E53E3E" fill-opacity="0.1" stroke="#E53E3E"/> <!-- Panic Button -->
    <text x="270" y="265" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E53E3E" text-anchor="middle">EMERGENCY SOS</text>
  </g>
  
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D" text-anchor="middle">10-Inch Android Smart Intercom Gateway UI</text>
</svg>
