<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Central Relay Block -->
  <rect x="50" y="100" width="120" height="150" rx="8" fill="#1A365D"/>
  <text x="110" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Relay</text>
  
  <!-- Terminals -->
  <circle cx="150" cy="150" r="5" fill="#E2E8F0"/>
  <text x="140" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="end">COM</text>
  
  <circle cx="150" cy="180" r="5" fill="#E2E8F0"/>
  <text x="140" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="end">NO</text>
  
  <circle cx="150" cy="210" r="5" fill="#E2E8F0"/>
  <text x="140" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="end">NC</text>
  
  <!-- Power Supply -->
  <rect x="180" y="40" width="60" height="40" rx="4" fill="#F7FAFC" stroke="#CBD5E0"/>
  <text x="210" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">12V DC</text>
  
  <!-- Maglock Icon -->
  <rect x="280" y="140" width="80" height="100" rx="4" fill="#A0AEC0"/>
  <rect x="290" y="150" width="60" height="80" fill="#2D3748"/>
  <text x="320" y="225" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">MAGLOCK</text>
  
  <!-- Wiring Paths -->
  <!-- Positive Path (Red) -->
  <path d="M240 60 L320 60 L320 140" stroke="#E53E3E" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Common to Power Supply (Black) -->
  <path d="M150 150 L210 150 L210 80" stroke="#2D3748" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- NO to Lock Ground (Blue/Black) -->
  <path d="M150 180 L320 180" stroke="#3182CE" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Labels -->
  <text x="215" y="145" font-family="Arial, sans-serif" font-size="10" fill="#E53E3E" font-weight="bold">Positive (+)</text>
  <text x="240" y="175" font-family="Arial, sans-serif" font-size="10" fill="#3182CE" font-weight="bold">Switched Control</text>
  <text x="320" y="320" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">Typical 12V Fail-Safe Wiring</text>
</svg>
