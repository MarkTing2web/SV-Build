<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Base Unit (Wall Mounted) -->
  <rect x="120" y="80" width="100" height="240" rx="4" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="2"/>
  
  <!-- Handset Cradle -->
  <rect x="130" y="100" width="80" height="40" rx="2" fill="#E2E8F0"/>
  <rect x="130" y="240" width="80" height="40" rx="2" fill="#E2E8F0"/>
  
  <!-- Indicators & Buttons -->
  <circle cx="170" cy="200" r="15" fill="#2B6CB0"/> <!-- Unlock Button -->
  <path d="M165 195 L175 195 L175 208 L165 208 Z" fill="white"/>
  <circle cx="170" cy="210" r="4" fill="white"/>
  <text x="170" y="235" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2B6CB0" text-anchor="middle">RELEASE</text>
  
  <circle cx="170" cy="160" r="4" fill="#48BB78"/> <!-- Power/Status LED -->
  
  <!-- Coiled Cord (Simplified) -->
  <path d="M140 280 C110 300 110 330 140 350 C170 370 170 380 140 400" stroke="#718096" stroke-width="3" fill="none"/>
  
  <!-- Handset (Vertical) -->
  <rect x="100" y="90" width="60" height="220" rx="15" fill="#F7FAFC" stroke="#A0AEC0" stroke-width="1.5"/>
  <rect x="110" y="110" width="40" height="20" rx="10" fill="#E2E8F0"/> <!-- Earpiece -->
  <rect x="115" y="270" width="30" height="15" rx="5" fill="#E2E8F0"/> <!-- Mic -->

  <text x="200" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D" text-anchor="middle">Traditional Audio Handset Intercom Station</text>
</svg>
