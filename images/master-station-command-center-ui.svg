<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Sleek 10" Monitor Frame -->
  <rect x="25" y="50" width="350" height="300" rx="4" fill="#171923" stroke="#2D3748" stroke-width="2"/>
  <rect x="35" y="60" width="330" height="280" fill="#1A202C"/> <!-- Display -->
  
  <!-- UI Layout (4 Quadrants) -->
  <rect x="40" y="65" width="320" height="270" rx="2" fill="#F7FAFC"/>
  
  <!-- Top Left: Video Grid (4 Feeds) -->
  <g id="video-grid">
    <rect x="45" y="70" width="150" height="110" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
    <rect x="50" y="75" width="70" height="50" fill="#2D3748"/>
    <text x="85" y="130" font-family="Arial, sans-serif" font-size="7" fill="#A0AEC0" text-anchor="middle">Main Gate</text>
    <rect x="123" y="75" width="70" height="50" fill="#2D3748"/>
    <text x="158" y="130" font-family="Arial, sans-serif" font-size="7" fill="#A0AEC0" text-anchor="middle">Side Gate</text>
    <rect x="50" y="135" width="70" height="40" fill="#2D3748"/>
    <text x="85" y="180" font-family="Arial, sans-serif" font-size="7" fill="#A0AEC0" text-anchor="middle">Guardhouse</text>
    <rect x="123" y="135" width="70" height="40" fill="#2D3748"/>
    <text x="158" y="180" font-family="Arial, sans-serif" font-size="7" fill="#A0AEC0" text-anchor="middle">Carpark 1</text>
  </g>
  
  <!-- Top Right: Directory List -->
  <g id="directory">
    <rect x="205" y="70" width="150" height="110" rx="4" fill="white" stroke="#CBD5E0"/>
    <text x="215" y="85" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748">STATION DIRECTORY</text>
    <rect x="210" y="95" width="140" height="15" rx="2" fill="#EBF8FF" stroke="#3182CE"/>
    <text x="215" y="105" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Reception • Ground Floor</text>
    <text x="215" y="125" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Manager's Office • Level 3</text>
    <text x="215" y="145" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Conference A • Level 3</text>
    <text x="215" y="165" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Warehouse • Loading Dock</text>
  </g>
  
  <!-- Bottom Left: Control Center Tools -->
  <g id="controls">
    <rect x="45" y="190" width="150" height="140" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
    <rect x="55" y="200" width="130" height="30" rx="6" fill="#2B6CB0"/>
    <text x="120" y="218" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">GROUP CALL</text>
    <rect x="55" y="240" width="130" height="30" rx="6" fill="#3182CE" fill-opacity="0.1" stroke="#3182CE"/>
    <text x="120" y="258" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3182CE" text-anchor="middle">ALL BROADCAST</text>
    <rect x="55" y="280" width="130" height="40" rx="6" fill="#E53E3E"/>
    <text x="120" y="305" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">DOOR RELEASE ALL</text>
  </g>
  
  <!-- Bottom Right: Status Panel -->
  <g id="status">
    <rect x="205" y="190" width="150" height="140" rx="4" fill="white" stroke="#CBD5E0"/>
    <text x="215" y="210" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748">SYSTEM STATUS</text>
    <circle cx="215" cy="230" r="4" fill="#48BB78"/>
    <text x="225" y="233" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Main Gate: Online</text>
    <circle cx="215" cy="250" r="4" fill="#48BB78"/>
    <text x="225" y="253" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Reception: IDLE</text>
    <circle cx="215" cy="270" r="4" fill="#E53E3E"/>
    <text x="225" y="273" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Guardhouse: BUSY</text>
    <circle cx="215" cy="290" r="4" fill="#48BB78"/>
    <text x="225" y="293" font-family="Arial, sans-serif" font-size="8" fill="#2D3748">Monitor 03-01: IDLE</text>
  </g>
  
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D" text-anchor="middle">Master Station Command Center UI Dashboard</text>
</svg>
