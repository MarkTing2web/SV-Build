<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Cat6 Cross-section (Left) -->
  <circle cx="100" cy="180" r="60" fill="#E2E8F0" stroke="#A0AEC0" stroke-width="2"/>
  <text x="100" y="260" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Cat6 Cross-section</text>
  
  <!-- Twisted Pairs Inside -->
  <!-- Pair 1: Blue/White -->
  <circle cx="90" cy="160" r="12" fill="#3182CE"/>
  <circle cx="110" cy="160" r="12" fill="white" stroke="#3182CE"/>
  <!-- Pair 2: Orange/White -->
  <circle cx="130" cy="180" r="12" fill="#ED8936"/>
  <circle cx="130" cy="200" r="12" fill="white" stroke="#ED8936"/>
  <!-- Pair 3: Green/White -->
  <circle cx="90" cy="200" r="12" fill="#48BB78"/>
  <circle cx="70" cy="200" r="12" fill="white" stroke="#48BB78"/>
  <!-- Pair 4: Brown/White -->
  <circle cx="70" cy="180" r="12" fill="#975A16"/>
  <circle cx="70" cy="160" r="12" fill="white" stroke="#975A16"/>
  
  <!-- RJ45 Connector (Right) -->
  <rect x="420" y="100" width="100" height="150" rx="4" fill="#EBF8FF" stroke="#3182CE"/>
  <rect x="430" y="110" width="80" height="20" rx="1" fill="#2D3748"/> <!-- Latch -->
  <rect x="420" y="80" width="100" height="20" fill="#EBF8FF"/> <!-- Top Part -->
  <text x="470" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">RJ45 Connector</text>
  
  <!-- T568B Pin-out Colors -->
  <rect x="430" y="140" width="8" height="80" fill="#ED8936"/> <!-- 1. Orange/White -->
  <rect x="440" y="140" width="8" height="80" fill="#DD6B20"/> <!-- 2. Orange -->
  <rect x="450" y="140" width="8" height="80" fill="#48BB78" stroke="#E2E8F0"/> <!-- 3. Green/White -->
  <rect x="460" y="140" width="8" height="80" fill="#3182CE"/> <!-- 4. Blue -->
  <rect x="470" y="140" width="8" height="80" fill="#3182CE" stroke="#E2E8F0"/> <!-- 5. Blue/White -->
  <rect x="480" y="140" width="8" height="80" fill="#38A169"/> <!-- 6. Green -->
  <rect x="490" y="140" width="8" height="80" fill="#975A16" stroke="#E2E8F0"/> <!-- 7. Brown/White -->
  <rect x="500" y="140" width="8" height="80" fill="#744210"/> <!-- 8. Brown -->
  
  <text x="470" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">T568B Order</text>
  
  <!-- Connection from Cable to Connector -->
  <path d="M160 180 L420 180" stroke="#A0AEC0" stroke-width="8" stroke-dasharray="8 4"/>
  <rect x="250" y="160" width="100" height="40" rx="20" fill="white" stroke="#3182CE"/>
  <text x="300" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Gigabit Ethernet</text>
  
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Cat6 Cable Infrastructure & Pin-out (T568B)</text>
</svg>
