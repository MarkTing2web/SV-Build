<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Stage 1: Button -->
  <rect x="20" y="140" width="80" height="80" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <circle cx="60" cy="180" r="15" fill="#3182CE"/>
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Call Button</text>
  
  <!-- Arrow 1 to 2 -->
  <path d="M100 180 L125 180" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 2: Signal -->
  <rect x="125" y="140" width="80" height="80" rx="8" fill="#F7FAFC" stroke="#CBD5E0"/>
  <path d="M135 180 L195 180" stroke="#3182CE" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="165" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Low-Voltage</text>
  
  <!-- Arrow 2 to 3 -->
  <path d="M205 180 L230 180" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 3: Coil -->
  <rect x="230" y="140" width="80" height="80" rx="8" fill="#EBF8FF" stroke="#3182CE"/>
  <path d="M245 180 C245 160 255 160 255 180 C255 200 265 200 265 180 C265 160 275 160 275 180 C275 200 285 200 285 180 C285 160 295 160 295 180" stroke="#3182CE" stroke-width="2" fill="none"/>
  <text x="270" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Relay Coil</text>
  
  <!-- Arrow 3 to 4 -->
  <path d="M310 180 L335 180" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 4: Contacts -->
  <rect x="335" y="140" width="80" height="80" rx="8" fill="#F7FAFC" stroke="#CBD5E0"/>
  <path d="M350 190 L380 170" stroke="#2D3748" stroke-width="2"/> <!-- Open switch -->
  <circle cx="350" cy="190" r="3" fill="#2D3748"/>
  <circle cx="390" cy="190" r="3" fill="#2D3748"/>
  <text x="375" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Contacts Close</text>
  
  <!-- Arrow 4 to 5 -->
  <path d="M415 180 L440 180" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 5: Power -->
  <rect x="440" y="140" width="80" height="80" rx="8" fill="#FFF5F5" stroke="#E53E3E"/>
  <text x="480" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E53E3E" text-anchor="middle">12V/24V</text>
  <text x="480" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Lock Power</text>
  
  <!-- Arrow 5 to 6 -->
  <path d="M520 180 L545 180" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 6: Unlock -->
  <rect x="545" y="140" width="80" height="80" rx="8" fill="#F0FFF4" stroke="#38A169"/>
  <path d="M575 185 L585 185 M570 185 A10 10 0 1 1 590 185" stroke="#38A169" stroke-width="3" fill="none"/> <!-- Lock icon -->
  <text x="585" y="240" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Door Unlocks</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E0" />
    </marker>
  </defs>
  <text x="320" y="50" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A365D" text-anchor="middle">Relay Release Sequence (Basic Principle)</text>
</svg>
