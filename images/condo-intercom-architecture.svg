<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Entrance -->
  <rect x="40" y="40" width="120" height="60" rx="4" fill="#1A365D"/>
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Lobby Entrance Panel</text>
  
  <!-- Network Hub -->
  <rect x="260" y="40" width="120" height="60" rx="4" fill="#2D3748"/>
  <text x="320" y="75" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">PoE Network Switch</text>
  
  <!-- Paths -->
  <!-- 1. On-Premise Server -->
  <rect x="260" y="140" width="120" height="50" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="320" y="170" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Management Server</text>
  
  <!-- 2. Units -->
  <rect x="50" y="240" width="80" height="50" rx="4" fill="#F7FAFC" stroke="#CBD5E0"/>
  <text x="90" y="270" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Unit Monitor 1</text>
  <rect x="140" y="240" width="80" height="50" rx="4" fill="#F7FAFC" stroke="#CBD5E0"/>
  <text x="180" y="270" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Unit Monitor 2</text>
  <text x="240" y="270" font-family="Arial, sans-serif" font-size="12" fill="#718096">...</text>
  
  <!-- 3. Cloud & Apps -->
  <path d="M520 80 Q550 50 580 80 Q610 80 610 110 Q610 140 580 140 Q550 140 530 140 Q500 140 500 110 Q500 80 520 80 Z" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="555" y="115" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2B6CB0" text-anchor="middle">Cloud Engine</text>
  
  <rect x="515" y="240" width="80" height="50" rx="8" fill="#2D3748"/>
  <rect x="525" y="250" width="60" height="30" fill="#EDF2F7"/> <!-- App Screen -->
  <text x="555" y="305" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#2B6CB0">Mobile Apps</text>
  
  <!-- 4. Guard Station -->
  <rect x="400" y="140" width="100" height="50" rx="4" fill="#38A169" fill-opacity="0.1" stroke="#38A169"/>
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2F855A" text-anchor="middle">Guard Station</text>
  
  <!-- Arrows -->
  <path d="M160 70 L260 70" stroke="#718096" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M320 100 L320 140" stroke="#718096" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M380 70 L500 100" stroke="#3182CE" stroke-width="2" marker-end="url(#aH)"/>
  <path d="M320 190 L130 240" stroke="#718096" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#aH)"/>
  <path d="M555 140 L555 240" stroke="#3182CE" stroke-width="1.5" marker-end="url(#aH)"/>
  <path d="M380 100 L450 140" stroke="#2F855A" stroke-width="1.5" marker-end="url(#aH)"/>
  
  <defs>
    <marker id="aH" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="currentColor"/>
    </marker>
  </defs>
  
  <text x="320" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Condominium IP Intercom System Architecture</text>
</svg>
