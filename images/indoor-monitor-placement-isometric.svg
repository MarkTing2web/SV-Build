<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Isometric Room (Corner View) -->
  <path d="M320 320 L60 220 L60 80 L320 180 Z" fill="#F7FAFC" stroke="#CBD5E0"/> <!-- Wall Left -->
  <path d="M320 320 L580 220 L580 80 L320 180 Z" fill="#EDF2F7" stroke="#CBD5E0"/> <!-- Wall Right -->
  <path d="M60 220 L320 320 L580 220 L320 120 Z" fill="#E2E8F0" stroke="#CBD5E0"/> <!-- Floor -->
  
  <!-- Window (Right Wall - Incorrect Location) -->
  <rect x="420" y="110" width="80" height="60" transform="skewY(-20)" fill="#BEE3F8" stroke="#3182CE"/>
  <path d="M410 160 L440 190" stroke="#E53E3E" stroke-width="3"/> <path d="M440 160 L410 190" stroke="#E53E3E" stroke-width="3"/> <!-- Red X -->
  <text x="450" y="210" font-family="Arial, sans-serif" font-size="9" fill="#E53E3E" font-weight="bold">GLARE ZONE</text>
  
  <!-- AC Vent (Top Corner - Incorrect Location) -->
  <rect x="290" y="140" width="60" height="20" fill="#CBD5E0"/>
  <path d="M310 160 L330 180" stroke="#E53E3E" stroke-width="2"/> <path d="M330 160 L310 180" stroke="#E53E3E" stroke-width="2"/> <!-- Red X -->
  
  <!-- Correct Monitor Placement (Left Wall) -->
  <rect x="140" y="120" width="40" height="30" transform="skewY(20)" fill="#2D3748" stroke="#A0AEC0"/>
  <circle cx="210" cy="150" r="10" fill="#48BB78"/> <!-- Green Tick -->
  <path d="M206 150 L209 153 L214 147" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Height Annotation -->
  <path d="M130 140 L130 245" stroke="#3182CE" stroke-width="1.5" marker-start="url(#vArrow)" marker-end="url(#vArrow)"/>
  <text x="120" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3182CE" text-anchor="middle" transform="rotate(-90 120 195)">1.4m - 1.5m</text>
  
  <!-- Labels -->
  <text x="180" y="110" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">OPTIMAL POSITION</text>
  <text x="180" y="270" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">Clear sightlines from main area</text>
  
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Optimal Indoor Monitor Placement Guidelines</text>

  <defs>
    <marker id="vArrow" markerWidth="6" markerHeight="4" refX="3" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#3182CE"/>
    </marker>
  </defs>
</svg>
