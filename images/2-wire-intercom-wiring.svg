<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Components -->
  <!-- 1. Power Supply -->
  <rect x="40" y="140" width="100" height="100" rx="4" fill="#1A365D"/>
  <text x="90" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Power Supply</text>
  <text x="90" y="205" font-family="Arial, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">(24V DC)</text>
  
  <!-- 2. Door Station -->
  <rect x="200" y="140" width="80" height="120" rx="4" fill="#2D3748"/>
  <circle cx="240" cy="170" r="10" fill="#4A5568"/>
  <text x="240" y="275" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Door Station</text>
  
  <!-- 3. Indoor Monitor 1 -->
  <rect x="360" y="140" width="100" height="70" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <rect x="370" y="150" width="80" height="50" fill="#A0AEC0" fill-opacity="0.3"/>
  <text x="410" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Monitor 1</text>
  
  <!-- 4. Indoor Monitor 2 -->
  <rect x="500" y="140" width="100" height="70" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <rect x="510" y="150" width="80" height="50" fill="#A0AEC0" fill-opacity="0.3"/>
  <text x="550" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Monitor 2</text>
  
  <!-- 2-Wire Bus (T-Tap Parallel) -->
  <path d="M140 185 L200 185" stroke="#E53E3E" stroke-width="2" marker-start="url(#dot)" marker-end="url(#dot)"/> <!-- Positive line -->
  <path d="M140 195 L200 195" stroke="#2D3748" stroke-width="2" marker-start="url(#dot)" marker-end="url(#dot)"/> <!-- Negative line -->
  
  <!-- Bus Continued -->
  <path d="M280 185 L600 185" stroke="#E53E3E" stroke-width="2"/>
  <path d="M280 195 L600 195" stroke="#2D3748" stroke-width="2"/>
  
  <!-- T-Taps to Monitors -->
  <path d="M410 185 L410 140" stroke="#E53E3E" stroke-width="1.5"/>
  <path d="M420 195 L420 140" stroke="#2D3748" stroke-width="1.5"/>
  
  <path d="M550 185 L550 140" stroke="#E53E3E" stroke-width="1.5"/>
  <path d="M560 195 L560 140" stroke="#2D3748" stroke-width="1.5"/>
  
  <!-- Labels -->
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E53E3E" text-anchor="middle">2-Core Bus Line</text>
  <text x="320" y="215" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">(Power + Audio Combined)</text>

  <defs>
    <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
      <circle cx="2" cy="2" r="2" fill="#2D3748"/>
    </marker>
  </defs>
  
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A365D" text-anchor="middle">Common 2-Wire Intercom Wiring (Parallel Bus)</text>
</svg>
