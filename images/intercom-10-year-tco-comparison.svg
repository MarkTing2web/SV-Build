<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Y-Axis Cost Labels (Linear-ish scale) -->
  <g font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="end">
    <text x="70" y="55">SGD 250k</text>
    <text x="70" y="105">SGD 200k</text>
    <text x="70" y="155">SGD 150k</text>
    <text x="70" y="205">SGD 100k</text>
    <text x="70" y="255">SGD 50k</text>
    <text x="70" y="305">0</text>
  </g>
  <line x1="80" y1="50" x2="80" y2="305" stroke="#CBD5E0" stroke-width="1.5"/>
  <line x1="80" y1="305" x2="600" y2="305" stroke="#CBD5E0" stroke-width="1.5"/>
  
  <!-- BAR 1: Small Landed Home -->
  <!-- Total ~15k (Initial 8k, Ongoing 7k) -->
  <g id="landed">
    <rect x="130" y="275" width="60" height="30" fill="#1A365D"/> <!-- Initial -->
    <rect x="130" y="255" width="60" height="20" fill="#4FD1C5"/> <!-- Ongoing -->
    <text x="160" y="325" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Landed Home</text>
    <text x="160" y="250" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2B6CB0" text-anchor="middle">~SGD 15k</text>
  </g>
  
  <!-- BAR 2: 250-Unit Condo -->
  <!-- Total ~250k (Initial 180k, Ongoing 70k) -->
  <g id="condo">
    <rect x="290" y="125" width="60" height="180" fill="#1A365D"/> <!-- Initial -->
    <rect x="290" y="65" width="60" height="60" fill="#4FD1C5"/> <!-- Ongoing -->
    <text x="320" y="325" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Condominium</text>
    <text x="320" y="60" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2B6CB0" text-anchor="middle">~SGD 250k</text>
  </g>
  
  <!-- BAR 3: Medium Office -->
  <!-- Total ~80k (Initial 45k, Ongoing 35k) -->
  <g id="office">
    <rect x="450" y="225" width="60" height="80" fill="#1A365D"/> <!-- Initial -->
    <rect x="450" y="175" width="60" height="50" fill="#4FD1C5"/> <!-- Ongoing -->
    <text x="480" y="325" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Medium Office</text>
    <text x="480" y="170" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2B6CB0" text-anchor="middle">~SGD 80k</text>
  </g>
  
  <!-- Legend -->
  <rect x="200" y="340" width="10" height="10" fill="#1A365D"/>
  <text x="215" y="349" font-family="Arial, sans-serif" font-size="9" fill="#718096">Initial Installation</text>
  <rect x="360" y="340" width="10" height="10" fill="#4FD1C5"/>
  <text x="375" y="349" font-family="Arial, sans-serif" font-size="9" fill="#718096">10-Year Ongoing (Maint/License)</text>

  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">10-Year Total Cost of Ownership (TCO) Comparison</text>
</svg>
