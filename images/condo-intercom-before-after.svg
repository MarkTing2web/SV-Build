<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Vertical Split -->
  <rect x="0" y="0" width="200" height="400" fill="#F7FAFC"/> <!-- Left: Before -->
  <line x1="200" y1="0" x2="200" y2="400" stroke="#CBD5E0" stroke-width="2"/>
  
  <!-- Left Half: BEFORE (Analogue) -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#718096" text-anchor="middle">BEFORE</text>
  <!-- Aged Unit -->
  <rect x="40" y="100" width="120" height="180" rx="4" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="2"/>
  <rect x="55" y="120" width="90" height="70" rx="2" fill="#A0AEC0"/> <!-- CRT screen -->
  <path d="M65 140 L135 140 M65 150 L135 150" stroke="#718096" stroke-width="1" stroke-opacity="0.5"/> <!-- Scan lines -->
  <!-- Worn Buttons -->
  <circle cx="70" cy="220" r="10" fill="#CBD5E0" stroke="#A0AEC0"/>
  <circle cx="100" cy="220" r="10" fill="#CBD5E0" stroke="#A0AEC0"/>
  <circle cx="130" cy="220" r="10" fill="#CBD5E0" stroke="#A0AEC0"/>
  <rect x="60" y="245" width="10" height="20" fill="#CBD5E0"/> <!-- Handset cord -->
  
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="9" fill="#A0AEC0" text-anchor="middle">Aging Analogue CRT</text>
  <text x="100" y="325" font-family="Arial, sans-serif" font-size="8" fill="#CBD5E0" text-anchor="middle">(Parts Obsolete)</text>
  
  <!-- Right Half: AFTER (Modern IP) -->
  <text x="300" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3182CE" text-anchor="middle">AFTER</text>
  <!-- Sleek Modern Unit -->
  <rect x="240" y="120" width="120" height="100" rx="8" fill="white" stroke="#3182CE" stroke-width="2"/>
  <rect x="250" y="130" width="100" height="70" rx="4" fill="#2B6CB0"/> <!-- Modern LCD -->
  <path d="M270 165 L330 165" stroke="white" stroke-width="2" stroke-linecap="round"/> <!-- Play icon -->
  
  <!-- Status Light -->
  <circle cx="345" cy="140" r="3" fill="#48BB78"/>
  
  <text x="300" y="250" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Modern IP Upgrade</text>
  <text x="300" y="265" font-family="Arial, sans-serif" font-size="9" fill="#718096" text-anchor="middle">7" Touchscreen + HD Video</text>
  
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">Condo Intercom Transformation</text>
</svg>
