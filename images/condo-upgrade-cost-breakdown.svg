<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Pie Chart Calculation -->
  <!-- 44% = 158.4 deg -->
  <!-- 24% = 86.4 deg -->
  <!-- 13% = 46.8 deg -->
  <!-- 11% = 39.6 deg -->
  <!-- 7% = 25.2 deg -->
  <!-- 1% = 3.6 deg -->
  
  <!-- UNIT MONITORS (44%) -->
  <path d="M200 200 L200 60 A140 140 0 0 1 334.8 238.2 Z" fill="#1A365D" stroke="white" stroke-width="2"/>
  <text x="280" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">44%</text>
  
  <!-- INSTALLATION (24%) -->
  <path d="M200 200 L334.8 238.2 A140 140 0 0 1 170.8 336.9 Z" fill="#3182CE" stroke="white" stroke-width="2"/>
  <text x="240" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">24%</text>
  
  <!-- PROJECT MGMT (13%) -->
  <path d="M200 200 L170.8 336.9 A140 140 0 0 1 73.1 258.1 Z" fill="#4FD1C5" stroke="white" stroke-width="2"/>
  <text x="120" y="310" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#234E52" text-anchor="middle">13%</text>
  
  <!-- INFRASTRUCTURE (11%) -->
  <path d="M200 200 L73.1 258.1 A140 140 0 0 1 61.2 185.3 Z" fill="#90CDF4" stroke="white" stroke-width="2"/>
  <text x="75" y="220" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2C5282" text-anchor="middle">11%</text>
  
  <!-- ENTRANCE PANELS (7%) -->
  <path d="M200 200 L61.2 185.3 A140 140 0 0 1 81.3 95.8 Z" fill="#BEE3F8" stroke="white" stroke-width="2"/>
  <text x="85" y="140" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2C5282" text-anchor="middle">7%</text>
  
  <!-- OTHER (1%) -->
  <path d="M200 200 L81.3 95.8 A140 140 0 0 1 200 60 Z" fill="#CBD5E0" stroke="white" stroke-width="2"/>
  
  <!-- Legend / Labels -->
  <rect x="230" y="340" width="160" height="50" rx="4" fill="#F7FAFC" stroke="#E2E8F0"/>
  <text x="310" y="355" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1A365D" text-anchor="middle">MONITORS (44%)</text>
  <text x="310" y="370" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#3182CE" text-anchor="middle">INSTALLATION (24%)</text>
  <text x="310" y="385" font-family="Arial, sans-serif" font-size="7" fill="#718096" text-anchor="middle">Infrastructure / Planning (Bal.)</text>
  
  <text x="200" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">Typical Condo Upgrade Cost Breakdown</text>
</svg>
