<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Door Frame -->
  <rect x="50" y="20" width="300" height="40" fill="#E2E8F0"/>
  <rect x="50" y="60" width="40" height="320" fill="#E2E8F0"/>
  
  <!-- Glass Door Panel (Semitransparent) -->
  <rect x="90" y="60" width="260" height="320" fill="#BEE3F8" fill-opacity="0.3" stroke="#90CDF4" stroke-width="2"/>
  
  <!-- Electromagnetic Lock (Silver/Grey) -->
  <rect x="90" y="20" width="180" height="30" fill="#A0AEC0" stroke="#718096"/>
  <rect x="100" y="25" width="160" height="20" fill="#2D3748"/> <!-- Active Core -->
  
  <!-- U-Bracket and Armature Plate (On Door) -->
  <rect x="90" y="60" width="180" height="40" fill="#718096" stroke="#4A5568"/>
  <rect x="100" y="65" width="160" height="30" fill="#CBD5E0"/> <!-- Armature Plate -->
  
  <!-- Glass Clamping Detail -->
  <line x1="90" y1="100" x2="270" y2="100" stroke="#4A5568" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="50" y="235" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" transform="rotate(-90 50 235)">Frameless Glass Door</text>
  <text x="280" y="40" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748">Electromagnetic Lock</text>
  <text x="90" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3182CE">U-Bracket Clamp</text>
  
  <!-- Dimension Lines -->
  <path d="M90 140 L270 140" stroke="#CBD5E0" stroke-width="1" marker-start="url(#dot)" marker-end="url(#dot)"/>
  <text x="180" y="155" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Surface or Bracket Mount (Glass)</text>

  <defs>
    <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto">
      <circle cx="2" cy="2" r="2" fill="#CBD5E0"/>
    </marker>
  </defs>
  
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">600lb/1200lb Maglock on Glass Entry</text>
</svg>
