<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Relay Output (Left) -->
  <rect x="40" y="140" width="120" height="80" rx="4" fill="#1A365D"/>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Intercom</text>
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="10" fill="#A0AEC0" text-anchor="middle">Relay Output</text>
  
  <!-- Wiring Parallel Branches -->
  <!-- Positive Line (Red) -->
  <path d="M160 160 L240 160" stroke="#E53E3E" stroke-width="3" fill="none"/>
  <path d="M240 100 L240 220" stroke="#E53E3E" stroke-width="3" fill="none"/>
  <path d="M240 100 L320 100" stroke="#E53E3E" stroke-width="3" fill="none"/>
  <path d="M240 220 L320 220" stroke="#E53E3E" stroke-width="3" fill="none"/>
  
  <!-- Negative Line (Black) -->
  <path d="M160 200 L220 200" stroke="#2D3748" stroke-width="3" fill="none"/>
  <path d="M220 140 L220 260" stroke="#2D3748" stroke-width="3" fill="none"/>
  <path d="M220 140 L320 140" stroke="#2D3748" stroke-width="3" fill="none"/>
  <path d="M220 260 L320 260" stroke="#2D3748" stroke-width="3" fill="none"/>
  
  <!-- Lock 1 (Top) -->
  <rect x="320" y="90" width="100" height="60" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="370" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Maglock 1</text>
  
  <!-- Lock 2 (Bottom) -->
  <rect x="320" y="210" width="100" height="60" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="370" y="245" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Maglock 2</text>
  
  <!-- Double Door Visualization (Far Right) -->
  <rect x="480" y="110" width="60" height="140" fill="#BEE3F8" fill-opacity="0.5" stroke="#3182CE"/>
  <rect x="545" y="110" width="60" height="140" fill="#BEE3F8" fill-opacity="0.5" stroke="#3182CE"/>
  <text x="542" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748" text-anchor="middle">Double Door Entrance</text>

  <!-- Labels -->
  <text x="210" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0">Parallel Circuit</text>
  <text x="210" y="320" font-family="Arial, sans-serif" font-size="10" fill="#718096">Recommendation: Connect multiple locks in parallel to ensure consistent voltage across both devices.</text>
  
  <text x="320" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Double-Door Multi-Lock Parallel Wiring</text>
</svg>
