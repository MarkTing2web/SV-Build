<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Outer Jacket (Grey) -->
  <rect x="25" y="150" width="100" height="100" rx="8" fill="#E2E8F0"/>
  <text x="75" y="270" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">Outer Jacket</text>
  
  <!-- Fanned Out Conductors -->
  <!-- Red Wire (Power/Audio) -->
  <path d="M125 170 C160 170 180 140 220 120" stroke="#E53E3E" stroke-width="6" stroke-linecap="round"/>
  <rect x="220" y="110" width="140" height="25" rx="4" fill="#FFF5F5" stroke="#E53E3E"/>
  <text x="230" y="128" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E53E3E">Power / Audio (+)</text>
  
  <!-- Black Wire (Power/Audio) -->
  <path d="M125 190 C160 190 180 170 220 160" stroke="#2D3748" stroke-width="6" stroke-linecap="round"/>
  <rect x="220" y="150" width="140" height="25" rx="4" fill="#F7FAFC" stroke="#CBD5E0"/>
  <text x="230" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2D3748">Power / Audio (-)</text>
  
  <!-- Shielded Coaxial (Video) -->
  <path d="M125 210 C160 210 180 230 220 250" stroke="#A0AEC0" stroke-width="12" stroke-linecap="round"/>
  <circle cx="220" cy="250" r="10" fill="#E2E8F0" stroke="#718096"/> <!-- Coax Cross-section -->
  <circle cx="220" cy="250" r="3" fill="#2D3748"/> <!-- Central Conductor -->
  <rect x="235" y="240" width="125" height="40" rx="4" fill="#EBF8FF" stroke="#3182CE"/>
  <text x="240" y="258" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3182CE">Shielded Coaxial</text>
  <text x="240" y="272" font-family="Arial, sans-serif" font-size="9" fill="#2B6CB0">(Analogue Video)</text>
  
  <!-- Green/White Wire (Control/Comm) -->
  <path d="M125 230 C160 230 180 300 220 320" stroke="#48BB78" stroke-width="6" stroke-linecap="round"/>
  <rect x="220" y="310" width="140" height="25" rx="4" fill="#F0FFF4" stroke="#38A169"/>
  <text x="230" y="328" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#38A169">Service / Signal</text>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">4-Wire Intercom Cable Detail</text>
</svg>
