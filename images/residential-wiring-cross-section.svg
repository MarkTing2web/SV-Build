<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Building Outline (Cross-section) -->
  <path d="M250 300 L600 300 L600 80 L300 80 L250 150 Z" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="2"/>
  <line x1="250" y1="200" x2="600" y2="200" stroke="#CBD5E0" stroke-width="2"/> <!-- First floor floor -->
  
  <!-- Ground Floor Areas -->
  <text x="420" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#A0AEC0" text-anchor="middle">GROUND FLOOR</text>
  <text x="420" y="270" font-family="Arial, sans-serif" font-size="10" fill="#CBD5E0" text-anchor="middle">(Kitchen / Living)</text>
  
  <!-- First Floor Areas -->
  <text x="420" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#A0AEC0" text-anchor="middle">FIRST FLOOR</text>
  <text x="420" y="160" font-family="Arial, sans-serif" font-size="10" fill="#CBD5E0" text-anchor="middle">(Master Bedroom)</text>
  
  <!-- Gate Pillar (Roadside) -->
  <rect x="50" y="240" width="30" height="80" fill="#E2E8F0" stroke="#CBD5E0"/>
  <rect x="55" y="250" width="20" height="30" fill="#1A365D"/> <!-- Door Station -->
  <text x="65" y="340" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">Gate</text>
  
  <!-- Wiring Path (Blue Dotted) -->
  <!-- 1. Underground -->
  <path d="M65 285 L65 310 L260 310 L260 250" stroke="#3182CE" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <text x="160" y="325" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE" text-anchor="middle">Underground Conduit</text>
  
  <!-- 2. Inside Ground Floor Wall -->
  <rect x="250" y="200" width="10" height="100" fill="#CBD5E0" fill-opacity="0.3"/> <!-- Wall Cavity -->
  <path d="M260 250 L350 250" stroke="#3182CE" stroke-width="2" marker-end="url(#monitorDot)"/> <!-- Drop to monitor GF -->
  <text x="360" y="254" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE">Kitchen Monitor</text>
  
  <!-- 3. To First Floor -->
  <path d="M260 250 L260 140 L350 140" stroke="#3182CE" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#monitorDot)"/>
  <text x="260" y="120" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE" text-anchor="middle">Wall Cavity Route</text>
  <text x="360" y="144" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE">Master Monitor</text>
  
  <!-- Controller / Switch -->
  <rect x="240" y="240" width="40" height="20" rx="2" fill="#2D3748"/>
  <text x="235" y="235" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2D3748">Controller</text>

  <defs>
    <marker id="monitorDot" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <circle cx="3" cy="3" r="3" fill="#1A365D"/>
    </marker>
  </defs>
  
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Landed Property Intercom Wiring Routing Strategy</text>
</svg>
