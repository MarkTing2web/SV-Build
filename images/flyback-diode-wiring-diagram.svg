<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Lock Coil -->
  <rect x="150" y="150" width="100" height="100" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <path d="M160 200 C160 180 170 180 170 200 C170 220 180 220 180 200 C180 180 190 180 190 200 C190 220 200 220 200 200 C200 180 210 180 210 200 C210 220 220 220 220 200 C220 180 230 180 230 200 C230 220 240 220 240 200" stroke="#2D3748" stroke-width="2" fill="none"/>
  <text x="200" y="165" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748" text-anchor="middle">LOCK COIL</text>
  
  <!-- Flyback Diode (Parallel Connection) -->
  <path d="M140 180 L140 220" stroke="#3182CE" stroke-width="2"/>
  <path d="M140 180 L120 180 L120 220 L140 220" stroke="#3182CE" stroke-width="2" fill="none"/>
  <!-- Diode Symbol -->
  <path d="M120 190 L130 210 L110 210 Z" fill="#3182CE"/>
  <line x1="110" y1="190" x2="130" y2="190" stroke="#3182CE" stroke-width="2"/>
  <text x="110" y="170" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3182CE" text-anchor="middle">FLYBACK DIODE</text>
  
  <!-- Wiring to Relay/PSU -->
  <path d="M140 180 L140 100 L250 100" stroke="#E53E3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M140 220 L140 300 L250 300" stroke="#2D3748" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Labels -->
  <text x="255" y="105" font-family="Arial, sans-serif" font-size="10" fill="#E53E3E" font-weight="bold">Relay Signal (+)</text>
  <text x="255" y="305" font-family="Arial, sans-serif" font-size="10" fill="#2D3748" font-weight="bold">Common (-)</text>
  
  <text x="50" y="360" font-family="Arial, sans-serif" font-size="11" fill="#718096">Recommendation: Install diode in parallel across coil terminals to quench back-EMF voltage spikes and protect relay contacts.</text>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Flyback Diode (Inductive Back-EMF) Protection</text>
</svg>
