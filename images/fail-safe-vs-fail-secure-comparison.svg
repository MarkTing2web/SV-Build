<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Left Panel: Fail-Safe -->
  <g id="fail-safe">
    <rect x="20" y="50" width="290" height="260" rx="4" fill="#F0FFF4" stroke="#38A169"/>
    <text x="165" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D3748" text-anchor="middle">Fail-Safe (Maglock)</text>
    
    <!-- Power Off Icon -->
    <rect x="60" y="100" width="30" height="40" rx="4" fill="#A0AEC0"/>
    <path d="M65 105 L85 135 M85 105 L65 135" stroke="#E53E3E" stroke-width="3"/>
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="10" fill="#2D3748">POWER OFF</text>
    
    <!-- Open Padlock -->
    <rect x="140" y="150" width="50" height="40" rx="4" fill="#38A169"/>
    <path d="M150 150 L150 120 A15 15 0 0 1 180 120" stroke="#3182CE" stroke-width="4" fill="none"/>
    
    <!-- Door Opens Arrow -->
    <path d="M165 210 L165 260" stroke="#38A169" stroke-width="6" marker-end="url(#arrowheadGreen)"/>
    <text x="165" y="280" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#38A169" text-anchor="middle">Door Relases Freely</text>
    <text x="165" y="295" font-family="Arial, sans-serif" font-size="10" fill="#2F855A" text-anchor="middle">LIFE SAFETY STANDARD</text>
  </g>
  
  <!-- Right Panel: Fail-Secure -->
  <g id="fail-secure">
    <rect x="330" y="50" width="290" height="260" rx="4" fill="#FFF5F5" stroke="#E53E3E"/>
    <text x="475" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2D3748" text-anchor="middle">Fail-Secure (Electric Strike)</text>
    
    <!-- Power Off Icon -->
    <rect x="370" y="100" width="30" height="40" rx="4" fill="#A0AEC0"/>
    <path d="M375 105 L395 135 M395 105 L375 135" stroke="#E53E3E" stroke-width="3"/>
    <text x="410" y="125" font-family="Arial, sans-serif" font-size="10" fill="#2D3748">POWER OFF</text>
    
    <!-- Closed Padlock -->
    <rect x="450" y="150" width="50" height="40" rx="4" fill="#E53E3E"/>
    <path d="M460 150 L460 130 A15 15 0 0 1 490 130 L490 150" stroke="#2D3748" stroke-width="4" fill="none"/>
    
    <!-- Door Locked Icon -->
    <circle cx="475" cy="235" r="25" fill="#E53E3E" fill-opacity="0.1" stroke="#E53E3E" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="475" y="240" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E53E3E" text-anchor="middle">✕</text>
    <text x="475" y="280" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E53E3E" text-anchor="middle">Door Remains Locked</text>
    <text x="475" y="295" font-family="Arial, sans-serif" font-size="10" fill="#9B2C2C" text-anchor="middle">HIGH SECURITY STANDARD</text>
  </g>
  
  <defs>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38A169"/>
    </marker>
  </defs>
  <text x="320" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A365D" text-anchor="middle">Operation Strategy during Power Failure</text>
</svg>
