<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="#F7FAFC"/>
  
  <!-- Browser/App Frame -->
  <rect x="20" y="20" width="600" height="320" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="20" y="20" width="600" height="40" rx="8 8 0 0" fill="#2D3748"/>
  <circle cx="40" cy="40" r="3" fill="#FF5F56"/> <circle cx="50" cy="40" r="3" fill="#FFBD2E"/> <circle cx="60" cy="40" r="3" fill="#27C93F"/>
  <text x="320" y="45" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Securevision VMS - Management Console v4.2</text>
  
  <!-- Sidebar -->
  <rect x="20" y="60" width="120" height="280" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="35" y="85" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2B6CB0">DASHBOARD</text>
  <rect x="25" y="95" width="110" height="25" rx="4" fill="#EBF8FF"/>
  <text x="35" y="112" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2C5282">CALL LOGS</text>
  <text x="35" y="140" font-family="Arial, sans-serif" font-size="9" fill="#718096">REPORTS</text>
  <text x="35" y="165" font-family="Arial, sans-serif" font-size="9" fill="#718096">SETTINGS</text>
  
  <!-- Header Controls -->
  <text x="155" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D">Call Communication Logs</text>
  <rect x="155" y="100" width="150" height="25" rx="4" fill="white" stroke="#CBD5E0"/>
  <text x="165" y="117" font-family="Arial, sans-serif" font-size="9" fill="#A0AEC0">Search by Unit...</text>
  <rect x="530" y="100" width="75" height="25" rx="4" fill="#3182CE"/>
  <text x="567" y="117" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">EXPORT CSV</text>
  
  <!-- Data Table -->
  <rect x="155" y="140" width="450" height="180" rx="4" fill="white" stroke="#E2E8F0"/>
  <rect x="155" y="140" width="450" height="25" rx="4 4 0 0" fill="#EDF2F7"/>
  <g font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#4A5568">
    <text x="165" y="157">TIMESTAMP</text>
    <text x="240" y="157">ENTRANCE</text>
    <text x="310" y="157">UNIT</text>
    <text x="360" y="157">DURATION</text>
    <text x="420" y="157">STATUS</text>
    <text x="500" y="157">THUMBNAIL</text>
  </g>
  
  <!-- Row 1 -->
  <line x1="155" y1="165" x2="605" y2="165" stroke="#F1F5F9"/>
  <g font-family="Arial, sans-serif" font-size="8" fill="#2D3748">
    <text x="165" y="182">29 Mar, 14:12:05</text>
    <text x="240" y="182">Lobby A (West)</text>
    <text x="310" y="182">#12-08</text>
    <text x="360" y="182">00:45</text>
    <rect x="420" y="172" width="50" height="14" rx="7" fill="#F0FFF4"/>
    <text x="445" y="182" fill="#2F855A" text-anchor="middle" font-weight="bold">UNLOCKED</text>
    <rect x="500" y="168" width="20" height="20" rx="2" fill="#CBD5E0"/>
  </g>
  
  <!-- Row 2 -->
  <line x1="155" y1="195" x2="605" y2="195" stroke="#F1F5F9"/>
  <g font-family="Arial, sans-serif" font-size="8" fill="#2D3748">
    <text x="165" y="212">29 Mar, 11:45:30</text>
    <text x="240" y="212">Side Gate 1</text>
    <text x="310" y="212">#04-12</text>
    <text x="360" y="212">00:12</text>
    <rect x="420" y="202" width="50" height="14" rx="7" fill="#FFF5F5"/>
    <text x="445" y="212" fill="#C53030" text-anchor="middle" font-weight="bold">MISSED</text>
    <rect x="500" y="198" width="20" height="20" rx="2" fill="#A0AEC0"/>
  </g>
  
  <!-- Row 3 -->
  <line x1="155" y1="225" x2="605" y2="225" stroke="#F1F5F9"/>
  <g font-family="Arial, sans-serif" font-size="8" fill="#2D3748">
    <text x="165" y="242">29 Mar, 09:20:11</text>
    <text x="240" y="242">Main Entrance</text>
    <text x="310" y="242">#20-01</text>
    <text x="360" y="242">01:30</text>
    <rect x="420" y="232" width="50" height="14" rx="7" fill="#F0FFF4"/>
    <text x="445" y="242" fill="#2F855A" text-anchor="middle" font-weight="bold">UNLOCKED</text>
    <rect x="500" y="228" width="20" height="20" rx="2" fill="#CBD5E0"/>
  </g>
  
  <!-- Data Footer -->
  <rect x="155" y="300" width="450" height="20" fill="#F8FAFC" rx="0 0 4 4"/>
  <text x="450" y="313" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Page 1 of 42 | Showing 1-20 of 840 logs</text>

  <text x="320" y="350" font-family="Arial, sans-serif" font-size="8" fill="#A0AEC0" text-anchor="middle">Rendered on 13" laptop display mockup</text>
</svg>
