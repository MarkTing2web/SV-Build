<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Horizontal Cable Line -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Sine Wave (Source - Clean) -->
  <path d="M50 200 C75 120 100 280 125 200 C150 120 175 280 200 200" stroke="#3182CE" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Sine Wave (Destination - Degraded/Noisy) -->
  <path d="M200 200 C210 180 215 210 225 180 C235 220 240 190 250 220 C260 170 265 240 275 190 C285 240 290 200 300 230 C310 170 315 250 325 210 C335 240 340 190 350 220" stroke="#3182CE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Labels -->
  <text x="50" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4A5568">Source</text>
  <text x="350" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4A5568" text-anchor="end">Received Signal</text>
  
  <!-- Arrows -->
  <path d="M50 190 L350 190" stroke="#CBD5E0" stroke-width="1" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#CBD5E0" />
    </marker>
  </defs>
  
  <!-- Description Text (Minimal) -->
  <text x="200" y="100" font-family="Arial, sans-serif" font-size="14" fill="#2D3748" text-anchor="middle" font-weight="bold">Analogue Signal Degradation</text>
</svg>
