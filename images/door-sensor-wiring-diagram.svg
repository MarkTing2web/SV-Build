<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>
  
  <!-- Door Closed Area (Top) -->
  <g id="closed">
    <!-- Door Frame (Top Line) -->
    <rect x="50" y="50" width="300" height="40" fill="#E2E8F0"/>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748">CLOSED STATE (GREEN)</text>
    
    <!-- Magnetic Contact Sensor (Fixed) -->
    <rect x="180" y="80" width="20" height="10" rx="1" fill="#1A365D"/>
    
    <!-- Door (Closed Position) -->
    <rect x="50" y="90" width="130" height="10" fill="#CBD5E0"/>
    
    <!-- Magnet (On Door) -->
    <rect x="160" y="80" width="20" height="10" rx="1" fill="#EBF8FF" stroke="#3182CE"/>
    
    <!-- Indicator Lamp -->
    <circle cx="210" cy="85" r="5" fill="#48BB78"/>
    <text x="220" y="90" font-family="Arial, sans-serif" font-size="9" fill="#2D3748">Circuit Closed</text>
  </g>
  
  <!-- Door Open Area (Bottom) -->
  <g id="open">
    <rect x="50" y="200" width="300" height="40" fill="#E2E8F0"/>
    <text x="50" y="190" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2D3748">OPEN STATE (RED)</text>
    
    <!-- Magnetic Contact Sensor (Fixed) -->
    <rect x="180" y="230" width="20" height="10" rx="1" fill="#1A365D"/>
    
    <!-- Door (Open Position - Swung out) -->
    <rect x="50" y="240" width="130" height="10" fill="#CBD5E0" transform="rotate(-30 50 240)"/>
    
    <!-- Magnet (On Door - Moved) -->
    <rect x="160" y="230" width="20" height="10" rx="1" fill="#EBF8FF" stroke="#3182CE" transform="rotate(-30 50 240)"/>
    
    <!-- Indicator Lamp -->
    <circle cx="210" cy="235" r="5" fill="#E53E3E"/>
    <text x="220" y="240" font-family="Arial, sans-serif" font-size="9" fill="#2D3748">Circuit Open (ALARM)</text>
  </g>
  
  <!-- Wiring to Controller -->
  <path d="M200 85 L320 85 L320 235 L200 235" stroke="#3182CE" stroke-width="1" stroke-dasharray="4 2" fill="none"/>
  <rect x="300" y="150" width="60" height="40" rx="4" fill="#1A365D"/>
  <text x="330" y="175" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">AUX INPUT</text>
  
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D" text-anchor="middle">Magnetic Door Position Sensor Wiring</text>
</svg>
