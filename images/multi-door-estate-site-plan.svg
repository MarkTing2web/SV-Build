<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="360" fill="white"/>
  
  <!-- Road (Front) -->
  <rect x="0" y="300" width="640" height="60" fill="#EDF2F7"/>
  <line x1="0" y1="330" x2="640" y2="330" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="10 10"/>
  <text x="320" y="350" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#718096" text-anchor="middle">MAIN ROAD</text>
  
  <!-- Property Boundary -->
  <path d="M100 300 L540 300 L540 50 L100 50 Z" fill="#F7FAFC" stroke="#A0AEC0" stroke-width="2"/>
  
  <!-- Main House (Centre) -->
  <rect x="220" y="120" width="200" height="120" rx="4" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="2"/>
  <text x="320" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2D3748" text-anchor="middle">MAIN BUNGALOW</text>
  
  <!-- Gate 1: Main Vehicle Gate (Front) -->
  <rect x="280" y="295" width="80" height="10" fill="#2D3748"/> <!-- Gate -->
  <circle cx="320" cy="275" r="10" fill="#3182CE"/>
  <text x="320" y="279" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="320" y="260" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE" text-anchor="middle">Main Vehicle Gate</text>
  
  <!-- Gate 2: Pedestrian Side Gate (East) -->
  <rect x="535" y="100" width="10" height="40" fill="#2D3748"/> <!-- Gate -->
  <circle cx="510" cy="120" r="10" fill="#3182CE"/>
  <text x="510" y="124" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="495" y="110" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE" text-anchor="end">Side Gate (Pedestrian)</text>
  
  <!-- Gate 3: Service Gate (West/Rear) -->
  <rect x="95" y="100" width="10" height="40" fill="#2D3748"/> <!-- Gate -->
  <circle cx="130" cy="120" r="10" fill="#3182CE"/>
  <text x="130" y="124" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="145" y="110" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3182CE">Service Gate (Rear)</text>
  
  <!-- Wiring Routes (Dotted) -->
  <path d="M320 275 L320 240" stroke="#3182CE" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M510 120 L420 180" stroke="#3182CE" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M130 120 L220 180" stroke="#3182CE" stroke-width="1.5" stroke-dasharray="4 2"/>
  
  <!-- Landscaping (Simple) -->
  <circle cx="150" cy="250" r="20" fill="#C6F6D5" fill-opacity="0.5"/>
  <circle cx="480" cy="250" r="25" fill="#C6F6D5" fill-opacity="0.5"/>
  <circle cx="150" cy="80" r="15" fill="#C6F6D5" fill-opacity="0.5"/>
  
  <rect x="440" y="320" width="180" height="25" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="530" y="336" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748" text-anchor="middle">Site Plan: 3 Intercom Door Stations</text>

  <text x="320" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A365D" text-anchor="middle">Multi-Door Estate Intercom Coverage Strategy</text>
</svg>
