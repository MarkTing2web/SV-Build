<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#F7FAFC"/>
  
  <!-- Monitor Frame -->
  <rect x="20" y="60" width="360" height="280" rx="12" fill="#2D3748" stroke="#1A202C" stroke-width="4"/>
  <rect x="40" y="80" width="320" height="240" rx="4" fill="white"/>
  
  <!-- UI Header -->
  <rect x="40" y="80" width="320" height="40" fill="#2B6CB0"/>
  <text x="55" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">CALL HISTORY</text>
  <path d="M320 95 L340 95 M320 100 L340 100 M320 105 L340 105" stroke="white" stroke-width="2"/> <!-- Menu Icon -->
  
  <!-- Search/Filter Bar -->
  <rect x="50" y="125" width="300" height="25" rx="4" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="60" y="142" font-family="Arial, sans-serif" font-size="10" fill="#A0AEC0">Search by Unit or Date...</text>
  
  <!-- Call Log Entries -->
  <!-- 1. Answered -->
  <g id="entry1">
    <rect x="40" y="155" width="320" height="40" fill="#F0FFF4"/>
    <rect x="50" y="160" width="30" height="30" rx="4" fill="#CBD5E0"/> <!-- Avatar Placeholder -->
    <path d="M55 185 Q65 175 75 185" stroke="#718096" stroke-width="2" fill="none"/> <circle cx="65" cy="170" r="5" fill="#718096"/>
    <text x="90" y="175" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748">Main Lobby Panel</text>
    <text x="90" y="188" font-family="Arial, sans-serif" font-size="8" fill="#718096">Today, 2:45 PM</text>
    <circle cx="330" cy="175" r="8" fill="#48BB78"/> <!-- Status -->
    <path d="M326 175 L329 178 L334 172" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- 2. Missed -->
  <g id="entry2">
    <rect x="40" y="195" width="320" height="40" fill="#FFF5F5"/>
    <rect x="50" y="200" width="30" height="30" rx="4" fill="#CBD5E0"/>
    <path d="M55 225 Q65 215 75 225" stroke="#718096" stroke-width="2" fill="none"/> <circle cx="65" cy="210" r="5" fill="#718096"/>
    <text x="90" y="215" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748">Car Park Entry</text>
    <text x="90" y="228" font-family="Arial, sans-serif" font-size="8" fill="#718096">Yesterday, 6:12 PM</text>
    <circle cx="330" cy="215" r="8" fill="#F56565"/> <!-- Status -->
    <path d="M326 211 L334 219 M334 211 L326 219" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- 3. Answered (Delivery) -->
  <g id="entry3">
    <rect x="40" y="235" width="320" height="40" fill="#F0FFF4"/>
    <rect x="50" y="240" width="30" height="30" rx="4" fill="#A0AEC0"/>
    <text x="65" y="260" font-family="Arial, sans-serif" font-size="6" fill="white" text-anchor="middle">LOGO</text>
    <text x="90" y="255" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748">Side Gate (Pedestrian)</text>
    <text x="90" y="268" font-family="Arial, sans-serif" font-size="8" fill="#718096">28 Mar, 11:30 AM</text>
    <circle cx="330" cy="255" r="8" fill="#48BB78"/>
    <path d="M326 255 L329 258 L334 252" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- 4. Unanswered -->
  <g id="entry4">
    <rect x="40" y="275" width="320" height="40" fill="white"/>
    <rect x="50" y="280" width="30" height="30" rx="4" fill="#CBD5E0"/>
    <text x="90" y="295" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2D3748">Service Gate</text>
    <text x="90" y="308" font-family="Arial, sans-serif" font-size="8" fill="#718096">27 Mar, 9:15 AM</text>
    <circle cx="330" cy="295" r="8" fill="#A0AEC0"/>
  </g>
  
  <!-- Tabs at Bottom -->
  <rect x="40" y="300" width="320" height="20" fill="#f8fafc"/>
  <text x="200" y="313" font-family="Arial, sans-serif" font-size="8" fill="#718096" text-anchor="middle">Showing last 30 days of activity</text>
</svg>
