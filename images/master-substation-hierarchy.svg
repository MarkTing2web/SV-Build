<svg width="644" height="362" viewBox="0 0 644 362" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="644" height="362" fill="white"/>
  
  <!-- Master Station Node -->
  <rect x="50" y="130" width="180" height="80" rx="8" fill="#1A365D"/>
  <text x="140" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Master Station</text>
  <text x="140" y="185" font-family="Arial, sans-serif" font-size="11" fill="#A0AEC0" text-anchor="middle">Full Calling + Monitoring</text>
  
  <!-- Substation Nodes (Hub and Spoke) -->
  <!-- Top Left Substation -->
  <rect x="350" y="30" width="120" height="50" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="410" y="55" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 1</text>
  <text x="410" y="70" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call Only</text>
  
  <!-- Mid Left Substation -->
  <rect x="420" y="105" width="120" height="50" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="480" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 2</text>
  <text x="480" y="145" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call Only</text>
  
  <!-- Mid Right Substation -->
  <rect x="420" y="185" width="120" height="50" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="480" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 3</text>
  <text x="480" y="225" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call Only</text>
  
  <!-- Top Right Substation -->
  <rect x="350" y="260" width="120" height="50" rx="6" fill="#EDF2F7" stroke="#CBD5E0"/>
  <text x="410" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748" text-anchor="middle">Substation 4</text>
  <text x="410" y="300" font-family="Arial, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Call Only</text>

  <!-- Broadcast Node -->
  <rect x="80" y="280" width="120" height="50" rx="6" fill="#EBF8FF" stroke="#3182CE" stroke-dasharray="4 2"/>
  <text x="140" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0" text-anchor="middle">All-Station</text>
  <text x="140" y="320" font-family="Arial, sans-serif" font-size="10" fill="#2B6CB0" text-anchor="middle">Broadcast</text>

  <!-- Arrows (Hub to Spokes) -->
  <!-- To Substation 1 -->
  <path d="M230 150 L345 70" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- To Substation 2 -->
  <path d="M230 170 L415 140" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- To Substation 3 -->
  <path d="M230 170 L415 200" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- To Substation 4 -->
  <path d="M230 190 L345 270" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow (Down to Broadcast) -->
  <path d="M140 210 L140 275" stroke="#3182CE" stroke-width="2" marker-end="url(#arrowheadBlue)"/>

  <!-- Marker Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E0" />
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE" />
    </marker>
  </defs>
</svg>
